<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="lensVig" cx="50%" cy="50%" r="50%">
      <stop offset="62%" stop-color="#000" stop-opacity="0"/>
      <stop offset="88%" stop-color="#000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.72"/>
    </radialGradient>
    <mask id="scopeHole">
      <rect width="1920" height="1080" fill="white"/>
      <circle cx="960" cy="540" r="300" fill="black"/>
    </mask>
  </defs>
  <!-- Scope housing (opaque ring + corners) -->
  <rect width="1920" height="1080" fill="#07080a" mask="url(#scopeHole)"/>
  <circle cx="960" cy="540" r="302" fill="none" stroke="#14161c" stroke-width="14"/>
  <circle cx="960" cy="540" r="296" fill="none" stroke="#2a2f38" stroke-width="3"/>
  <circle cx="960" cy="540" r="288" fill="none" stroke="#0c0e12" stroke-width="2" opacity="0.9"/>
  <!-- Inner lens vignette (drawn inside the glass) -->
  <circle cx="960" cy="540" r="300" fill="url(#lensVig)"/>
  <!-- Mil-dot style reticle -->
  <g stroke="#e8ecef" stroke-linecap="round" fill="#e8ecef" opacity="0.92">
    <line x1="960" y1="340" x2="960" y2="500" stroke-width="2"/>
    <line x1="960" y1="580" x2="960" y2="740" stroke-width="2"/>
    <line x1="760" y1="540" x2="920" y2="540" stroke-width="2"/>
    <line x1="1000" y1="540" x2="1160" y2="540" stroke-width="2"/>
    <circle cx="960" cy="540" r="3" fill="#ff3b3b" stroke="none"/>
    <circle cx="960" cy="480" r="1.8" fill="#e8ecef" stroke="none"/>
    <circle cx="960" cy="600" r="1.8" fill="#e8ecef" stroke="none"/>
    <circle cx="900" cy="540" r="1.8" fill="#e8ecef" stroke="none"/>
    <circle cx="1020" cy="540" r="1.8" fill="#e8ecef" stroke="none"/>
    <circle cx="960" cy="420" r="1.5" fill="#e8ecef" stroke="none" opacity="0.75"/>
    <circle cx="960" cy="660" r="1.5" fill="#e8ecef" stroke="none" opacity="0.75"/>
    <circle cx="840" cy="540" r="1.5" fill="#e8ecef" stroke="none" opacity="0.75"/>
    <circle cx="1080" cy="540" r="1.5" fill="#e8ecef" stroke="none" opacity="0.75"/>
  </g>
  <!-- Subtle glare arc -->
  <path d="M 780 420 A 200 200 0 0 1 920 360" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.08"/>
</svg>
