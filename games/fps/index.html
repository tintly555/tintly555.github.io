<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Zombie FPS Prototype</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      cursor: none;
    }

    .hud {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.5;
      user-select: none;
      pointer-events: none;
      min-width: 340px;
      font-size: 14px;
      backdrop-filter: blur(4px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.28);
    }

    .hint {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      background: rgba(0, 0, 0, 0.75);
      padding: 14px 18px;
      border-radius: 12px;
      pointer-events: none;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    .flash {
      position: fixed;
      inset: 0;
      background: rgba(255, 0, 0, 0);
      pointer-events: none;
      z-index: 10;
    }

    .crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 25;
      opacity: 1;
      transition: opacity 0.12s ease;
    }

    .crosshair.hidden {
      opacity: 0;
    }

    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 0 6px rgba(255,255,255,0.5);
    }

    .crosshair::before {
      left: 8px;
      top: 0;
      width: 2px;
      height: 18px;
    }

    .crosshair::after {
      left: 0;
      top: 8px;
      width: 18px;
      height: 2px;
    }

    .hitmarker {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 26px;
      height: 26px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 28;
      opacity: 0;
      transition: opacity 0.08s linear;
    }

    .hitmarker.show {
      opacity: 1;
    }

    .hitmarker::before,
    .hitmarker::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 22px;
      background: rgba(255,255,255,0.9);
      transform-origin: center center;
      box-shadow: 0 0 6px rgba(255,255,255,0.45);
    }

    .hitmarker::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .hitmarker::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .menu {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      background: radial-gradient(circle at center, #182136 0%, #0b0f18 75%);
    }

    .menu h1 {
      margin: 0 0 8px 0;
      font-size: 40px;
    }

    .menu p {
      margin: 0 0 18px 0;
      opacity: 0.8;
    }

    .menu button {
      width: 220px;
      padding: 14px 18px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
      color: #111827;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="menu" class="menu">
    <h1>3D Zombie FPS</h1>
    <p>单文件完整版基线</p>
    <button id="btnArena">Zombie Arena</button>
    <button id="btnCrossfire">Crossfire</button>
  </div>

  <div id="app"></div>
  <div class="hud" id="hud"></div>
  <div class="hint" id="hint">点击画面锁定鼠标并开始</div>
  <div class="flash" id="flash"></div>
  <div class="crosshair" id="crosshair"></div>
  <div class="hitmarker" id="hitmarker"></div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js";

    const app = document.getElementById("app");
    const hud = document.getElementById("hud");
    const hint = document.getElementById("hint");
    const flash = document.getElementById("flash");
    const crosshairEl = document.getElementById("crosshair");
    const hitmarkerEl = document.getElementById("hitmarker");
    const menuEl = document.getElementById("menu");
    const btnArena = document.getElementById("btnArena");
    const btnCrossfire = document.getElementById("btnCrossfire");

    let CURRENT_MAP = "arena";
    let started = false;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d111b);
    scene.fog = new THREE.Fog(0x0d111b, 28, 130);

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.rotation.order = "YXZ";

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0x8ea9ff, 0x2c2c2c, 1.1);
    scene.add(hemi);

    const moon = new THREE.DirectionalLight(0xe8ecff, 1.05);
    moon.position.set(28, 34, 22);
    moon.castShadow = true;
    moon.shadow.mapSize.set(2048, 2048);
    moon.shadow.camera.left = -100;
    moon.shadow.camera.right = 100;
    moon.shadow.camera.top = 100;
    moon.shadow.camera.bottom = -100;
    scene.add(moon);

    const worldSize = 260;

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(worldSize, worldSize, 80, 80),
      new THREE.MeshStandardMaterial({
        color: 0x43454d,
        roughness: 0.96,
        metalness: 0.02
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const ceiling = new THREE.Mesh(
      new THREE.PlaneGeometry(worldSize, worldSize),
      new THREE.MeshStandardMaterial({
        color: 0x171f33,
        roughness: 1,
        side: THREE.DoubleSide
      })
    );
    ceiling.position.y = 4.5;
    ceiling.rotation.x = Math.PI / 2;
    scene.add(ceiling);

    const wallMeshes = [];
    const wallBoxes = [];
    const decalGroup = new THREE.Group();
    const sparkGroup = new THREE.Group();
    const tracerGroup = new THREE.Group();
    const bloodGroup = new THREE.Group();
    scene.add(decalGroup, sparkGroup, tracerGroup, bloodGroup);

    function addWallBox(w, h, d, x, y, z, color = 0x6b7384) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({
          color,
          roughness: 0.88,
          metalness: 0.04
        })
      );
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      wallMeshes.push(mesh);
      wallBoxes.push(new THREE.Box3().setFromObject(mesh));
      return mesh;
    }

    function clearMap() {
      while (wallMeshes.length) {
        const mesh = wallMeshes.pop();
        scene.remove(mesh);
        mesh.geometry.dispose();
        mesh.material.dispose();
      }
      wallBoxes.length = 0;
    }

    function addWindowWallX(centerX, centerZ, totalW, wallH = 4.5, thick = 1.0, windowW = 4, windowBottom = 1.4, windowTop = 3.0) {
      const pillarW = (totalW - windowW) / 2;
      addWallBox(pillarW, wallH, thick, centerX - (windowW / 2 + pillarW / 2), wallH / 2, centerZ);
      addWallBox(pillarW, wallH, thick, centerX + (windowW / 2 + pillarW / 2), wallH / 2, centerZ);

      const lowerH = windowBottom;
      if (lowerH > 0) addWallBox(windowW, lowerH, thick, centerX, lowerH / 2, centerZ);

      const upperH = wallH - windowTop;
      if (upperH > 0) addWallBox(windowW, upperH, thick, centerX, windowTop + upperH / 2, centerZ);
    }

    function addWindowWallZ(centerX, centerZ, totalD, wallH = 4.5, thick = 1.0, windowD = 4, windowBottom = 1.4, windowTop = 3.0) {
      const pillarD = (totalD - windowD) / 2;
      addWallBox(thick, wallH, pillarD, centerX, wallH / 2, centerZ - (windowD / 2 + pillarD / 2));
      addWallBox(thick, wallH, pillarD, centerX, wallH / 2, centerZ + (windowD / 2 + pillarD / 2));

      const lowerH = windowBottom;
      if (lowerH > 0) addWallBox(thick, lowerH, windowD, centerX, lowerH / 2, centerZ);

      const upperH = wallH - windowTop;
      if (upperH > 0) addWallBox(thick, upperH, windowD, centerX, windowTop + upperH / 2, centerZ);
    }

    function buildMapArena() {
      const S = 42;
      const H = 4.5;

      addWallBox(S * 2, H, 1.0, 0, H / 2, -S);
      addWallBox(S * 2, H, 1.0, 0, H / 2,  S);
      addWallBox(1.0, H, S * 2, -S, H / 2, 0);
      addWallBox(1.0, H, S * 2,  S, H / 2, 0);

      addWindowWallX(0, -18, 28, H, 1.0, 6, 1.4, 3.1);
      addWindowWallX(0,  18, 28, H, 1.0, 6, 1.4, 3.1);

      addWindowWallZ(-18, 0, 22, H, 1.0, 5, 1.4, 3.0);
      addWindowWallZ( 18, 0, 22, H, 1.0, 5, 1.4, 3.0);

      addWallBox(10, 2.2, 1.0, -26, 1.1, -8, 0x70798a);
      addWallBox(10, 2.2, 1.0,  26, 1.1,  8, 0x70798a);

      addWallBox(1.0, 2.2, 10, -10, 1.1,  26, 0x70798a);
      addWallBox(1.0, 2.2, 10,  10, 1.1, -26, 0x70798a);

      addWallBox(6, 2.5, 2, -28, 1.25, 20, 0x5e6778);
      addWallBox(6, 2.5, 2,  28, 1.25,-20, 0x5e6778);
      addWallBox(2, 2.5, 6, -20, 1.25,-28, 0x5e6778);
      addWallBox(2, 2.5, 6,  20, 1.25, 28, 0x5e6778);

      addWallBox(8, 3.2, 1.0, -12, 1.6, 0, 0x697183);
      addWallBox(8, 3.2, 1.0,  12, 1.6, 0, 0x697183);
      addWallBox(1.0, 3.2, 8, 0, 1.6, -12, 0x697183);
      addWallBox(1.0, 3.2, 8, 0, 1.6,  12, 0x697183);
    }

    function buildMapCrossfire() {
      const H = 4.5;

      addWallBox(90, H, 1.0, 0, H / 2, -45);
      addWallBox(90, H, 1.0, 0, H / 2,  45);
      addWallBox(1.0, H, 90, -45, H / 2, 0);
      addWallBox(1.0, H, 90,  45, H / 2, 0);

      addWindowWallX(0, 0, 24, H, 1.0, 8, 1.4, 3.1);
      addWindowWallZ(0, 0, 24, H, 1.0, 8, 1.4, 3.1);

      addWallBox(18, 2.4, 1.0, -22, 1.2, -14, 0x70798a);
      addWallBox(18, 2.4, 1.0,  22, 1.2,  14, 0x70798a);

      addWallBox(1.0, 2.4, 18, -14, 1.2, 22, 0x70798a);
      addWallBox(1.0, 2.4, 18,  14, 1.2,-22, 0x70798a);

      addWindowWallX(-28, 28, 14, H, 1.0, 4, 1.2, 3.0);
      addWindowWallX( 28,-28, 14, H, 1.0, 4, 1.2, 3.0);
    }

    const MAP_BUILDERS = {
      arena: buildMapArena,
      crossfire: buildMapCrossfire
    };

    const MAP_SPAWNS = {
      arena: [
        [-22, -22], [22, -22], [-22, 22], [22, 22],
        [0, -30], [0, 30], [-30, 0], [30, 0]
      ],
      crossfire: [
        [-30, -30], [30, 30], [-30, 30], [30, -30],
        [0, -34], [0, 34], [-34, 0], [34, 0]
      ]
    };

    const player = {
      position: new THREE.Vector3(-30, 1.65, -30),
      yaw: 0,
      pitch: 0,
      radius: 0.34,
      speed: 6.5,
      health: 100,
      velocityY: 0,
      onGround: true
    };

    const keys = { w:false, a:false, s:false, d:false, space:false };
    const state = {
      locked: false,
      mouseDown: false,
      ads: false,
      score: 0,
      flashTimer: 0,
      recoil: 0,
      weaponIndex: 1,
      lastShot: 0,
      spreadBloom: 0,
      enemies: [],
      tracers: [],
      reloading: false,
      reloadEnd: 0,
      hitmarkerTimer: 0
    };

    const weapons = [
      {
        name: "Pistol",
        fireDelay: 260,
        auto: false,
        pellets: 1,
        spreadBase: 0.010,
        spreadBloomAdd: 0.004,
        spreadBloomMax: 0.026,
        recover: 0.024,
        recoil: 0.052,
        damageHead: 70,
        damageBody: 36,
        damageLegs: 22,
        color: 0xffe08a,
        magSize: 12,
        ammo: 12,
        reloadTime: 1200,
        soundBase: 520,
        adsFov: 67
      },
      {
        name: "Assault Rifle",
        fireDelay: 82,
        auto: true,
        pellets: 1,
        spreadBase: 0.013,
        spreadBloomAdd: 0.004,
        spreadBloomMax: 0.045,
        recover: 0.035,
        recoil: 0.028,
        damageHead: 42,
        damageBody: 24,
        damageLegs: 16,
        color: 0x8fdcff,
        magSize: 30,
        ammo: 30,
        reloadTime: 1600,
        soundBase: 720,
        adsFov: 55
      },
      {
        name: "Shotgun",
        fireDelay: 520,
        auto: false,
        pellets: 7,
        spreadBase: 0.055,
        spreadBloomAdd: 0.014,
        spreadBloomMax: 0.095,
        recover: 0.045,
        recoil: 0.060,
        damageHead: 24,
        damageBody: 15,
        damageLegs: 10,
        color: 0xffb47a,
        magSize: 8,
        ammo: 8,
        reloadTime: 1900,
        soundBase: 260,
        adsFov: 63
      }
    ];

    function weapon() {
      return weapons[state.weaponIndex];
    }

    function updateHud() {
      const w = weapon();
      hud.innerHTML = `
        3D Zombie FPS<br>
        W A S D 移动 | 空格跳跃 | R换弹<br>
        鼠标自由视角 | 右键瞄准 | 1 2 3 切枪<br>
        地图: ${CURRENT_MAP}<br>
        武器: ${w.name}<br>
        弹匣: ${w.ammo} / ${w.magSize}${state.reloading ? "（换弹中）" : ""}<br>
        ❤️ Health: ${Math.max(0, Math.floor(player.health))}<br>
        🎯 Score: ${state.score}
      `;
    }
    updateHud();

    function collidesWithWalls(pos) {
      const sphere = new THREE.Sphere(new THREE.Vector3(pos.x, 1.0, pos.z), player.radius);
      for (const box of wallBoxes) {
        if (box.intersectsSphere(sphere)) return true;
      }
      return false;
    }

    function resolveWallSliding(nextPos) {
      const result = player.position.clone();

      const tryX = result.clone();
      tryX.x = nextPos.x;
      if (!collidesWithWalls(tryX)) result.x = tryX.x;

      const tryZ = result.clone();
      tryZ.z = nextPos.z;
      if (!collidesWithWalls(tryZ)) result.z = tryZ.z;

      return result;
    }

    function makeZombie(x, z, type = "normal") {
      const root = new THREE.Group();
      const torsoRoot = new THREE.Group();
      const leftArmRoot = new THREE.Group();
      const rightArmRoot = new THREE.Group();
      const leftLegRoot = new THREE.Group();
      const rightLegRoot = new THREE.Group();

      let bodyColor = 0x53775a;
      let headColor = 0xa5b89a;
      let shirtColor = 0x708f74;
      let hp = 100;
      let speed = 1.75;
      let attackDamage = 8;
      let attackCooldown = 0.42;
      let ranged = false;
      let rangeDistance = 12;

      if (type === "fast") {
        bodyColor = 0x8a7b22;
        headColor = 0xcab85b;
        shirtColor = 0x9d8c31;
        hp = 70;
        speed = 2.55;
        attackDamage = 6;
        attackCooldown = 0.30;
      } else if (type === "gunner") {
        bodyColor = 0x7a3f3f;
        headColor = 0xbe8d8d;
        shirtColor = 0x8a4b4b;
        hp = 85;
        speed = 1.25;
        attackDamage = 7;
        attackCooldown = 0.95;
        ranged = true;
        rangeDistance = 14;
      } else if (type === "tank") {
        bodyColor = 0x3f5367;
        headColor = 0x7c9ab2;
        shirtColor = 0x4b6276;
        hp = 180;
        speed = 1.05;
        attackDamage = 14;
        attackCooldown = 0.70;
      }

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.76, 0.96, 0.42),
        new THREE.MeshStandardMaterial({ color: bodyColor })
      );
      body.position.y = 1.10;
      torsoRoot.add(body);

      const tornShirt = new THREE.Mesh(
        new THREE.BoxGeometry(0.60, 0.30, 0.10),
        new THREE.MeshStandardMaterial({ color: shirtColor })
      );
      tornShirt.position.set(0, 1.15, 0.23);
      torsoRoot.add(tornShirt);

      const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.50, 0.50, 0.50),
        new THREE.MeshStandardMaterial({ color: headColor })
      );
      head.position.y = 1.82;
      torsoRoot.add(head);

      const hair = new THREE.Mesh(
        new THREE.BoxGeometry(0.52, 0.12, 0.52),
        new THREE.MeshStandardMaterial({ color: 0x25201d })
      );
      hair.position.y = 2.00;
      torsoRoot.add(hair);

      leftArmRoot.position.set(-0.52, 1.52, 0.02);
      rightArmRoot.position.set(0.52, 1.52, 0.02);

      const armL = new THREE.Mesh(
        new THREE.BoxGeometry(0.22, 0.84, 0.22),
        new THREE.MeshStandardMaterial({ color: bodyColor })
      );
      armL.position.set(0, -0.42, 0.16);
      leftArmRoot.add(armL);

      const armR = armL.clone();
      rightArmRoot.add(armR);

      const handL = new THREE.Mesh(
        new THREE.BoxGeometry(0.20, 0.20, 0.20),
        new THREE.MeshStandardMaterial({ color: headColor })
      );
      handL.position.set(0, -0.82, 0.28);
      leftArmRoot.add(handL);

      const handR = handL.clone();
      rightArmRoot.add(handR);

      leftLegRoot.position.set(-0.18, 0.60, 0);
      rightLegRoot.position.set(0.18, 0.60, 0);

      const legL = new THREE.Mesh(
        new THREE.BoxGeometry(0.26, 0.90, 0.26),
        new THREE.MeshStandardMaterial({ color: 0x3f4552 })
      );
      legL.position.set(0, -0.45, 0);
      leftLegRoot.add(legL);

      const legR = legL.clone();
      rightLegRoot.add(legR);

      root.add(torsoRoot, leftArmRoot, rightArmRoot, leftLegRoot, rightLegRoot);
      root.position.set(x, 0, z);

      root.traverse((o) => {
        if (o.isMesh) {
          o.castShadow = true;
          o.receiveShadow = true;
        }
      });

      scene.add(root);

      const hpCanvas = document.createElement("canvas");
      hpCanvas.width = 128;
      hpCanvas.height = 24;
      const hpCtx = hpCanvas.getContext("2d");
      const hpTexture = new THREE.CanvasTexture(hpCanvas);
      const hpSprite = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: hpTexture,
          transparent: true,
          depthTest: false
        })
      );
      hpSprite.scale.set(1.7, 0.32, 1);
      hpSprite.position.set(0, 2.75, 0);
      root.add(hpSprite);

      return {
        type,
        group: root,
        torsoRoot,
        leftArmRoot,
        rightArmRoot,
        leftLegRoot,
        rightLegRoot,
        head,
        body,
        legL,
        legR,
        hpCanvas,
        hpCtx,
        hpTexture,
        hpSprite,
        alive: true,
        hp,
        maxHp: hp,
        attackCooldownTimer: 0,
        attackCooldown,
        attackDamage,
        ranged,
        rangeDistance,
        respawnTimer: 0,
        spawn: new THREE.Vector3(x, 0, z),
        walkTime: Math.random() * 10,
        moving: false,
        attackPhase: 0,
        speed
      };
    }

    function drawEnemyHp(enemy) {
      const ctx = enemy.hpCtx;
      ctx.clearRect(0, 0, 128, 24);
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(4, 8, 120, 8);
      ctx.fillStyle = enemy.type === "tank" ? "#60a5fa" : (enemy.type === "gunner" ? "#f87171" : (enemy.type === "fast" ? "#facc15" : "#22c55e"));
      ctx.fillRect(4, 8, 120 * Math.max(0, enemy.hp) / enemy.maxHp, 8);
      ctx.strokeStyle = "rgba(255,255,255,0.85)";
      ctx.lineWidth = 1;
      ctx.strokeRect(4, 8, 120, 8);
      enemy.hpTexture.needsUpdate = true;
    }

    function resetEnemies() {
      for (const enemy of state.enemies) {
        scene.remove(enemy.group);
      }
      state.enemies.length = 0;

      const spawnPoints = MAP_SPAWNS[CURRENT_MAP];
      for (let i = 0; i < spawnPoints.length; i++) {
        const [x, z] = spawnPoints[i];
        let type = "normal";
        if (i === 1 || i === 5) type = "fast";
        if (i === 2 || i === 6) type = "gunner";
        if (i === 7) type = "tank";
        const zombie = makeZombie(x, z, type);
        drawEnemyHp(zombie);
        state.enemies.push(zombie);
      }
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playGunSound(w) {
      if (audioCtx.state === "suspended") audioCtx.resume();

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = "square";
      osc.frequency.setValueAtTime(w.soundBase, now);
      osc.frequency.exponentialRampToValueAtTime(w.soundBase * 0.45, now + 0.08);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(2200, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.10, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.12);
    }

    function createBulletMark(point, normal) {
      if (decalGroup.children.length > 140) {
        const old = decalGroup.children[0];
        decalGroup.remove(old);
        old.geometry.dispose();
        old.material.dispose();
      }

      const mark = new THREE.Mesh(
        new THREE.CircleGeometry(0.08, 12),
        new THREE.MeshBasicMaterial({
          color: 0x1a1a1a,
          transparent: true,
          opacity: 0.85
        })
      );

      mark.position.copy(point).add(normal.clone().multiplyScalar(0.01));
      mark.lookAt(point.clone().add(normal));
      decalGroup.add(mark);
    }

    function createSparks(point, color = 0xffdd88) {
      for (let i = 0; i < 5; i++) {
        const geo = new THREE.SphereGeometry(0.025, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ color });
        const spark = new THREE.Mesh(geo, mat);
        spark.position.copy(point);
        spark.userData.vel = new THREE.Vector3(
          (Math.random() - 0.5) * 2.4,
          Math.random() * 1.8,
          (Math.random() - 0.5) * 2.4
        );
        spark.userData.life = 0.18;
        sparkGroup.add(spark);
      }
    }

    function createBlood(point) {
      for (let i = 0; i < 7; i++) {
        const geo = new THREE.SphereGeometry(0.03, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ color: 0x9d1111 });
        const drop = new THREE.Mesh(geo, mat);
        drop.position.copy(point);
        drop.userData.vel = new THREE.Vector3(
          (Math.random() - 0.5) * 1.6,
          Math.random() * 1.4,
          (Math.random() - 0.5) * 1.6
        );
        drop.userData.life = 0.26;
        bloodGroup.add(drop);
      }
      state.hitmarkerTimer = 0.08;
      hitmarkerEl.classList.add("show");
    }

    function updateBlood(dt) {
      const dead = [];
      bloodGroup.children.forEach((drop) => {
        drop.userData.life -= dt;
        drop.position.addScaledVector(drop.userData.vel, dt);
        drop.userData.vel.y -= 9 * dt;
        if (drop.userData.life <= 0) dead.push(drop);
      });

      for (const drop of dead) {
        bloodGroup.remove(drop);
        drop.geometry.dispose();
        drop.material.dispose();
      }
    }

    function updateSparks(dt) {
      const dead = [];
      sparkGroup.children.forEach((spark) => {
        spark.userData.life -= dt;
        spark.position.addScaledVector(spark.userData.vel, dt);
        spark.userData.vel.y -= 8 * dt;
        if (spark.userData.life <= 0) dead.push(spark);
      });

      for (const spark of dead) {
        sparkGroup.remove(spark);
        spark.geometry.dispose();
        spark.material.dispose();
      }
    }

    function createTracer(start, end, color) {
      const geometry = new THREE.BufferGeometry().setFromPoints([start, end]);
      const material = new THREE.LineBasicMaterial({
        color,
        transparent: true,
        opacity: 1
      });
      const line = new THREE.Line(geometry, material);
      tracerGroup.add(line);
      state.tracers.push({ line, material, life: 0.08, maxLife: 0.08 });
    }

    camera.position.copy(player.position);
    scene.add(camera);

    const weaponRoot = new THREE.Group();
    camera.add(weaponRoot);

    function makeWeaponModel(type) {
      const root = new THREE.Group();

      const rightHand = new THREE.Mesh(
        new THREE.BoxGeometry(0.18, 0.18, 0.42),
        new THREE.MeshStandardMaterial({ color: 0xc89d7c })
      );
      rightHand.position.set(0.34, -0.34, -0.5);
      root.add(rightHand);

      const leftHand = new THREE.Mesh(
        new THREE.BoxGeometry(0.14, 0.14, 0.32),
        new THREE.MeshStandardMaterial({ color: 0xb98562 })
      );
      leftHand.position.set(0.12, -0.28, -0.42);
      root.add(leftHand);

      const gunGroup = new THREE.Group();
      let adsOffset = new THREE.Vector3();

      if (type === 0) {
        const frame = new THREE.Mesh(
          new THREE.BoxGeometry(0.12, 0.16, 0.46),
          new THREE.MeshStandardMaterial({ color: 0x3b4450 })
        );
        gunGroup.add(frame);

        const slide = new THREE.Mesh(
          new THREE.BoxGeometry(0.11, 0.06, 0.24),
          new THREE.MeshStandardMaterial({ color: 0x8891a0 })
        );
        slide.position.set(0, 0.08, -0.05);
        gunGroup.add(slide);

        const rearSight = new THREE.Mesh(
          new THREE.BoxGeometry(0.06, 0.04, 0.02),
          new THREE.MeshStandardMaterial({ color: 0xd1d5db })
        );
        rearSight.position.set(0, 0.10, 0.08);
        gunGroup.add(rearSight);

        const frontSight = new THREE.Mesh(
          new THREE.BoxGeometry(0.03, 0.06, 0.02),
          new THREE.MeshStandardMaterial({ color: 0xd1d5db })
        );
        frontSight.position.set(0, 0.11, -0.18);
        gunGroup.add(frontSight);

        const grip = new THREE.Mesh(
          new THREE.BoxGeometry(0.10, 0.22, 0.12),
          new THREE.MeshStandardMaterial({ color: 0x20242c })
        );
        grip.position.set(0, -0.17, 0.08);
        gunGroup.add(grip);

        gunGroup.position.set(0.28, -0.22, -0.70);
        adsOffset.set(-0.285, 0.205, 0.56);
      } else if (type === 1) {
        const body = new THREE.Mesh(
          new THREE.BoxGeometry(0.14, 0.16, 0.90),
          new THREE.MeshStandardMaterial({ color: 0x374151 })
        );
        gunGroup.add(body);

        const upper = new THREE.Mesh(
          new THREE.BoxGeometry(0.10, 0.06, 0.52),
          new THREE.MeshStandardMaterial({ color: 0x1f2937 })
        );
        upper.position.set(0, 0.08, -0.05);
        gunGroup.add(upper);

        const stock = new THREE.Mesh(
          new THREE.BoxGeometry(0.12, 0.16, 0.26),
          new THREE.MeshStandardMaterial({ color: 0x222831 })
        );
        stock.position.set(0, 0, 0.52);
        gunGroup.add(stock);

        const grip = new THREE.Mesh(
          new THREE.BoxGeometry(0.10, 0.24, 0.12),
          new THREE.MeshStandardMaterial({ color: 0x1f2937 })
        );
        grip.position.set(0, -0.18, 0.12);
        gunGroup.add(grip);

        const mag = new THREE.Mesh(
          new THREE.BoxGeometry(0.08, 0.30, 0.12),
          new THREE.MeshStandardMaterial({ color: 0x20242c })
        );
        mag.position.set(0, -0.16, 0.00);
        gunGroup.add(mag);

        const sightFrame = new THREE.Mesh(
          new THREE.BoxGeometry(0.08, 0.10, 0.02),
          new THREE.MeshStandardMaterial({ color: 0x111827 })
        );
        sightFrame.position.set(0, 0.065, -0.035);
        gunGroup.add(sightFrame);

        const lens = new THREE.Mesh(
          new THREE.PlaneGeometry(0.055, 0.075),
          new THREE.MeshBasicMaterial({
            color: 0x88ccff,
            transparent: true,
            opacity: 0.18
          })
        );
        lens.position.set(0, 0.065, -0.018);
        gunGroup.add(lens);

        const dot = new THREE.Mesh(
          new THREE.SphereGeometry(0.008, 8, 8),
          new THREE.MeshBasicMaterial({ color: 0xff2d2d })
        );
        dot.position.set(0, 0.065, -0.02);
        gunGroup.add(dot);

        gunGroup.position.set(0.25, -0.22, -0.80);
        adsOffset.set(-0.255, 0.175, 0.68);
      } else {
        const body = new THREE.Mesh(
          new THREE.BoxGeometry(0.18, 0.16, 0.92),
          new THREE.MeshStandardMaterial({ color: 0x6b7280 })
        );
        gunGroup.add(body);

        const pump = new THREE.Mesh(
          new THREE.BoxGeometry(0.16, 0.10, 0.24),
          new THREE.MeshStandardMaterial({ color: 0x7c5a3a })
        );
        pump.position.set(0, -0.08, -0.1);
        gunGroup.add(pump);

        const stock = new THREE.Mesh(
          new THREE.BoxGeometry(0.16, 0.16, 0.26),
          new THREE.MeshStandardMaterial({ color: 0x5d4633 })
        );
        stock.position.set(0, 0, 0.48);
        gunGroup.add(stock);

        const rearSight = new THREE.Mesh(
          new THREE.BoxGeometry(0.06, 0.04, 0.02),
          new THREE.MeshStandardMaterial({ color: 0xd1d5db })
        );
        rearSight.position.set(0, 0.09, 0.18);
        gunGroup.add(rearSight);

        const frontSight = new THREE.Mesh(
          new THREE.BoxGeometry(0.03, 0.08, 0.02),
          new THREE.MeshStandardMaterial({ color: 0xd1d5db })
        );
        frontSight.position.set(0, 0.10, -0.34);
        gunGroup.add(frontSight);

        gunGroup.position.set(0.23, -0.20, -0.82);
        adsOffset.set(-0.275, 0.19, 0.60);
      }

      root.add(gunGroup);
      root.userData.gun = gunGroup;
      root.userData.basePos = gunGroup.position.clone();
      root.userData.adsOffset = adsOffset.clone();

      return root;
    }

    const weaponModels = [
      makeWeaponModel(0),
      makeWeaponModel(1),
      makeWeaponModel(2)
    ];

    weaponModels.forEach((w, i) => {
      w.visible = i === state.weaponIndex;
      weaponRoot.add(w);
    });

    function setWeapon(index) {
      state.weaponIndex = index;
      state.ads = false;
      weaponModels.forEach((w, i) => {
        w.visible = i === index;
      });
      updateHud();
    }

    function startReload() {
      const w = weapon();
      if (state.reloading) return;
      if (w.ammo >= w.magSize) return;
      state.reloading = true;
      state.ads = false;
      state.reloadEnd = performance.now() + w.reloadTime;
      updateHud();
    }

    document.addEventListener("keydown", (e) => {
      const k = e.key.toLowerCase();
      if (k === "w") keys.w = true;
      if (k === "a") keys.a = true;
      if (k === "s") keys.s = true;
      if (k === "d") keys.d = true;
      if (k === " ") keys.space = true;
      if (k === "1") setWeapon(0);
      if (k === "2") setWeapon(1);
      if (k === "3") setWeapon(2);
      if (k === "r") startReload();
    });

    document.addEventListener("keyup", (e) => {
      const k = e.key.toLowerCase();
      if (k === "w") keys.w = false;
      if (k === "a") keys.a = false;
      if (k === "s") keys.s = false;
      if (k === "d") keys.d = false;
      if (k === " ") keys.space = false;
    });

    renderer.domElement.addEventListener("mousedown", (e) => {
      if (!state.locked) {
        renderer.domElement.requestPointerLock();
        return;
      }
      if (e.button === 0) {
        state.mouseDown = true;
        tryShoot();
      }
    });

    renderer.domElement.addEventListener("contextmenu", (e) => e.preventDefault());

    document.addEventListener("mouseup", (e) => {
      if (e.button === 0) state.mouseDown = false;
    });

    document.addEventListener("mousedown", (e) => {
      if (!state.locked) return;
      if (e.button === 2) {
        if (!state.reloading) state.ads = true;
      }
    });

    document.addEventListener("mouseup", (e) => {
      if (e.button === 2) {
        state.ads = false;
      }
    });

    renderer.domElement.addEventListener("click", () => {
      if (!state.locked) renderer.domElement.requestPointerLock();
    });

    document.addEventListener("pointerlockchange", () => {
      state.locked = document.pointerLockElement === renderer.domElement;
      hint.style.display = state.locked ? "none" : "block";
    });

    document.addEventListener("mousemove", (e) => {
      if (!state.locked || player.health <= 0) return;

      player.yaw -= e.movementX * 0.004;
      player.pitch -= e.movementY * 0.0032;

      const limit = Math.PI / 2 - 0.01;
      player.pitch = Math.max(-limit, Math.min(limit, player.pitch));
    });

    function updatePlayer(dt) {
      camera.rotation.y = player.yaw;
      camera.rotation.x = player.pitch;

      const targetFov = state.ads ? weapon().adsFov : 75;
      camera.fov += (targetFov - camera.fov) * Math.min(1, dt * 10);
      camera.updateProjectionMatrix();

      const forward = new THREE.Vector3(0, 0, -1)
        .applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);
      const right = new THREE.Vector3(1, 0, 0)
        .applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);

      const move = new THREE.Vector3();
      if (keys.w) move.add(forward);
      if (keys.s) move.sub(forward);
      if (keys.d) move.add(right);
      if (keys.a) move.sub(right);

      if (move.lengthSq() > 0) {
        move.normalize().multiplyScalar(player.speed * dt);
        const next = player.position.clone().add(new THREE.Vector3(move.x, 0, move.z));
        const resolved = resolveWallSliding(next);
        player.position.x = resolved.x;
        player.position.z = resolved.z;
      }

      if (keys.space && player.onGround) {
        player.velocityY = 5.8;
        player.onGround = false;
      }

      player.velocityY -= 14 * dt;
      player.position.y += player.velocityY * dt;

      if (player.position.y <= 1.65) {
        player.position.y = 1.65;
        player.velocityY = 0;
        player.onGround = true;
      }

      const movingNow = keys.w || keys.a || keys.s || keys.d;
      const headBob = (movingNow && player.onGround)
        ? Math.abs(Math.sin(performance.now() * 0.012)) * 0.02
        : 0;

      camera.position.copy(player.position);
      camera.position.y += headBob;
    }

    /* ==== PART 2 STARTS HERE ==== */
  </script>
</body>
</html>
