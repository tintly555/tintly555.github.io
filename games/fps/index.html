<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Zombie FPS Prototype</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      cursor: none;
    }

    .hud {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.5;
      user-select: none;
      pointer-events: none;
      min-width: 320px;
      font-size: 14px;
      backdrop-filter: blur(4px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.28);
    }

    .hint {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      background: rgba(0, 0, 0, 0.75);
      padding: 14px 18px;
      border-radius: 12px;
      pointer-events: none;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    .flash {
      position: fixed;
      inset: 0;
      background: rgba(255, 0, 0, 0);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="hud" id="hud"></div>
  <div class="hint" id="hint">点击画面锁定鼠标并开始</div>
  <div class="flash" id="flash"></div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js";

    const app = document.getElementById("app");
    const hud = document.getElementById("hud");
    const hint = document.getElementById("hint");
    const flash = document.getElementById("flash");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d111b);
    scene.fog = new THREE.Fog(0x0d111b, 28, 130);

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.rotation.order = "YXZ";

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0x8ea9ff, 0x2c2c2c, 1.1);
    scene.add(hemi);

    const moon = new THREE.DirectionalLight(0xe8ecff, 1.05);
    moon.position.set(28, 34, 22);
    moon.castShadow = true;
    moon.shadow.mapSize.set(2048, 2048);
    moon.shadow.camera.left = -100;
    moon.shadow.camera.right = 100;
    moon.shadow.camera.top = 100;
    moon.shadow.camera.bottom = -100;
    scene.add(moon);

    const worldSize = 260;

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(worldSize, worldSize, 80, 80),
      new THREE.MeshStandardMaterial({
        color: 0x43454d,
        roughness: 0.96,
        metalness: 0.02
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const ceiling = new THREE.Mesh(
      new THREE.PlaneGeometry(worldSize, worldSize),
      new THREE.MeshStandardMaterial({
        color: 0x171f33,
        roughness: 1,
        side: THREE.DoubleSide
      })
    );
    ceiling.position.y = 4.5;
    ceiling.rotation.x = Math.PI / 2;
    scene.add(ceiling);

    const wallMeshes = [];
    const wallBoxes = [];
    const decalGroup = new THREE.Group();
    const sparkGroup = new THREE.Group();
    const tracerGroup = new THREE.Group();
    scene.add(decalGroup);
    scene.add(sparkGroup);
    scene.add(tracerGroup);

    function addWallBox(w, h, d, x, y, z, color = 0x6b7384) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({
          color,
          roughness: 0.88,
          metalness: 0.04
        })
      );
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      wallMeshes.push(mesh);
      wallBoxes.push(new THREE.Box3().setFromObject(mesh));
      return mesh;
    }

    function addWindowWallX(centerX, centerZ, totalW, wallH = 4.5, thick = 1.0, windowW = 4, windowBottom = 1.4, windowTop = 3.0) {
      const pillarW = (totalW - windowW) / 2;
      addWallBox(pillarW, wallH, thick, centerX - (windowW / 2 + pillarW / 2), wallH / 2, centerZ);
      addWallBox(pillarW, wallH, thick, centerX + (windowW / 2 + pillarW / 2), wallH / 2, centerZ);

      const lowerH = windowBottom;
      if (lowerH > 0) {
        addWallBox(windowW, lowerH, thick, centerX, lowerH / 2, centerZ);
      }

      const upperH = wallH - windowTop;
      if (upperH > 0) {
        addWallBox(windowW, upperH, thick, centerX, windowTop + upperH / 2, centerZ);
      }
    }

    function addWindowWallZ(centerX, centerZ, totalD, wallH = 4.5, thick = 1.0, windowD = 4, windowBottom = 1.4, windowTop = 3.0) {
      const pillarD = (totalD - windowD) / 2;
      addWallBox(thick, wallH, pillarD, centerX, wallH / 2, centerZ - (windowD / 2 + pillarD / 2));
      addWallBox(thick, wallH, pillarD, centerX, wallH / 2, centerZ + (windowD / 2 + pillarD / 2));

      const lowerH = windowBottom;
      if (lowerH > 0) {
        addWallBox(thick, lowerH, windowD, centerX, lowerH / 2, centerZ);
      }

      const upperH = wallH - windowTop;
      if (upperH > 0) {
        addWallBox(thick, upperH, windowD, centerX, windowTop + upperH / 2, centerZ);
      }
    }

    function buildArena() {
      const S = 42;
      const H = 4.5;
      const T = 1.0;

      // 外圈
      addWallBox(S * 2, H, T, 0, H / 2, -S);
      addWallBox(S * 2, H, T, 0, H / 2,  S);
      addWallBox(T, H, S * 2, -S, H / 2, 0);
      addWallBox(T, H, S * 2,  S, H / 2, 0);

      // 中区长墙（不是迷宫）
      addWindowWallX(0, -18, 28, H, 1.0, 6, 1.4, 3.1);
      addWindowWallX(0,  18, 28, H, 1.0, 6, 1.4, 3.1);

      addWindowWallZ(-18, 0, 22, H, 1.0, 5, 1.4, 3.0);
      addWindowWallZ( 18, 0, 22, H, 1.0, 5, 1.4, 3.0);

      // 两侧半墙和掩体
      addWallBox(10, 2.2, 1.0, -26, 1.1, -8, 0x70798a);
      addWallBox(10, 2.2, 1.0,  26, 1.1,  8, 0x70798a);

      addWallBox(1.0, 2.2, 10, -10, 1.1,  26, 0x70798a);
      addWallBox(1.0, 2.2, 10,  10, 1.1, -26, 0x70798a);

      addWallBox(6, 2.5, 2, -28, 1.25, 20, 0x5e6778);
      addWallBox(6, 2.5, 2,  28, 1.25,-20, 0x5e6778);
      addWallBox(2, 2.5, 6, -20, 1.25,-28, 0x5e6778);
      addWallBox(2, 2.5, 6,  20, 1.25, 28, 0x5e6778);

      // 中间几个分散短墙
      addWallBox(8, 3.2, 1.0, -12, 1.6, 0, 0x697183);
      addWallBox(8, 3.2, 1.0,  12, 1.6, 0, 0x697183);
      addWallBox(1.0, 3.2, 8, 0, 1.6, -12, 0x697183);
      addWallBox(1.0, 3.2, 8, 0, 1.6,  12, 0x697183);
    }

    buildArena();

    const player = {
      position: new THREE.Vector3(-30, 1.65, -30),
      yaw: 0,
      pitch: 0,
      radius: 0.34,
      speed: 6.5,
      health: 100,
      velocityY: 0,
      onGround: true
    };

    const keys = { w:false, a:false, s:false, d:false, space:false };
    const state = {
      locked: false,
      mouseDown: false,
      score: 0,
      flashTimer: 0,
      recoil: 0,
      weaponIndex: 1,
      lastShot: 0,
      spreadBloom: 0,
      enemies: [],
      tracers: [],
      reloading: false,
      reloadEnd: 0
    };

    const weapons = [
      {
        name: "Pistol",
        fireDelay: 260,
        auto: false,
        pellets: 1,
        spreadBase: 0.005,
        spreadBloomAdd: 0.002,
        spreadBloomMax: 0.014,
        recover: 0.028,
        recoil: 0.045,
        damageHead: 70,
        damageBody: 36,
        damageLegs: 22,
        color: 0xffe08a,
        magSize: 12,
        ammo: 12,
        reloadTime: 1200,
        soundBase: 520
      },
      {
        name: "Assault Rifle",
        fireDelay: 82,
        auto: true,
        pellets: 1,
        spreadBase: 0.010,
        spreadBloomAdd: 0.004,
        spreadBloomMax: 0.034,
        recover: 0.035,
        recoil: 0.028,
        damageHead: 42,
        damageBody: 24,
        damageLegs: 16,
        color: 0x8fdcff,
        magSize: 30,
        ammo: 30,
        reloadTime: 1600,
        soundBase: 720
      },
      {
        name: "Shotgun",
        fireDelay: 520,
        auto: false,
        pellets: 7,
        spreadBase: 0.040,
        spreadBloomAdd: 0.010,
        spreadBloomMax: 0.070,
        recover: 0.045,
        recoil: 0.060,
        damageHead: 24,
        damageBody: 15,
        damageLegs: 10,
        color: 0xffb47a,
        magSize: 8,
        ammo: 8,
        reloadTime: 1900,
        soundBase: 260
      }
    ];

    function weapon() {
      return weapons[state.weaponIndex];
    }

    function updateHud() {
      const w = weapon();
      hud.innerHTML = `
        3D Zombie FPS<br>
        W A S D 移动 | 空格跳跃 | R换弹<br>
        鼠标自由视角 | 1 2 3 切枪<br>
        武器: ${w.name}<br>
        弹匣: ${w.ammo} / ${w.magSize}${state.reloading ? "（换弹中）" : ""}<br>
        ❤️ Health: ${Math.max(0, Math.floor(player.health))}<br>
        🎯 Score: ${state.score}
      `;
    }
    updateHud();

    function collidesWithWalls(pos) {
      const sphere = new THREE.Sphere(new THREE.Vector3(pos.x, 1.0, pos.z), player.radius);
      for (const box of wallBoxes) {
        if (box.intersectsSphere(sphere)) return true;
      }
      return false;
    }

    function resolveWallSliding(nextPos) {
      const result = player.position.clone();

      const tryX = result.clone();
      tryX.x = nextPos.x;
      if (!collidesWithWalls(tryX)) result.x = tryX.x;

      const tryZ = result.clone();
      tryZ.z = nextPos.z;
      if (!collidesWithWalls(tryZ)) result.z = tryZ.z;

      return result;
    }

    function makeZombie(x, z) {
      const root = new THREE.Group();
      const torsoRoot = new THREE.Group();
      const leftArmRoot = new THREE.Group();
      const rightArmRoot = new THREE.Group();
      const leftLegRoot = new THREE.Group();
      const rightLegRoot = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.76, 0.96, 0.42),
        new THREE.MeshStandardMaterial({ color: 0x53775a })
      );
      body.position.y = 1.10;
      torsoRoot.add(body);

      const tornShirt = new THREE.Mesh(
        new THREE.BoxGeometry(0.60, 0.30, 0.10),
        new THREE.MeshStandardMaterial({ color: 0x708f74 })
      );
      tornShirt.position.set(0, 1.15, 0.23);
      torsoRoot.add(tornShirt);

      const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.50, 0.50, 0.50),
        new THREE.MeshStandardMaterial({ color: 0xa5b89a })
      );
      head.position.y = 1.82;
      torsoRoot.add(head);

      const hair = new THREE.Mesh(
        new THREE.BoxGeometry(0.52, 0.12, 0.52),
        new THREE.MeshStandardMaterial({ color: 0x25201d })
      );
      hair.position.y = 2.00;
      torsoRoot.add(hair);

      // 手臂挂在肩上
      leftArmRoot.position.set(-0.52, 1.52, 0.02);
      rightArmRoot.position.set(0.52, 1.52, 0.02);

      const armL = new THREE.Mesh(
        new THREE.BoxGeometry(0.22, 0.84, 0.22),
        new THREE.MeshStandardMaterial({ color: 0x8fa48a })
      );
      armL.position.set(0, -0.42, 0.16);
      leftArmRoot.add(armL);

      const armR = armL.clone();
      rightArmRoot.add(armR);

      const handL = new THREE.Mesh(
        new THREE.BoxGeometry(0.20, 0.20, 0.20),
        new THREE.MeshStandardMaterial({ color: 0x9fb698 })
      );
      handL.position.set(0, -0.82, 0.28);
      leftArmRoot.add(handL);

      const handR = handL.clone();
      rightArmRoot.add(handR);

      // 腿挂在髋部
      leftLegRoot.position.set(-0.18, 0.60, 0);
      rightLegRoot.position.set(0.18, 0.60, 0);

      const legL = new THREE.Mesh(
        new THREE.BoxGeometry(0.26, 0.90, 0.26),
        new THREE.MeshStandardMaterial({ color: 0x3f4552 })
      );
      legL.position.set(0, -0.45, 0);
      leftLegRoot.add(legL);

      const legR = legL.clone();
      rightLegRoot.add(legR);

      root.add(torsoRoot, leftArmRoot, rightArmRoot, leftLegRoot, rightLegRoot);
      root.position.set(x, 0, z);

      root.traverse((o) => {
        if (o.isMesh) {
          o.castShadow = true;
          o.receiveShadow = true;
        }
      });

      scene.add(root);

      const hpCanvas = document.createElement("canvas");
      hpCanvas.width = 128;
      hpCanvas.height = 24;
      const hpCtx = hpCanvas.getContext("2d");
      const hpTexture = new THREE.CanvasTexture(hpCanvas);
      const hpSprite = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: hpTexture,
          transparent: true,
          depthTest: false
        })
      );
      hpSprite.scale.set(1.7, 0.32, 1);
      hpSprite.position.set(0, 2.75, 0);
      root.add(hpSprite);

      return {
        group: root,
        torsoRoot,
        leftArmRoot,
        rightArmRoot,
        leftLegRoot,
        rightLegRoot,
        head,
        body,
        armL,
        armR,
        legL,
        legR,
        hpCanvas,
        hpCtx,
        hpTexture,
        hpSprite,
        alive: true,
        hp: 100,
        attackCooldown: 0,
        respawnTimer: 0,
        spawn: new THREE.Vector3(x, 0, z),
        walkTime: Math.random() * 10,
        moving: false,
        attackPhase: 0
      };
    }

    function drawEnemyHp(enemy) {
      const ctx = enemy.hpCtx;
      ctx.clearRect(0, 0, 128, 24);
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(4, 8, 120, 8);
      ctx.fillStyle = "#22c55e";
      ctx.fillRect(4, 8, 120 * Math.max(0, enemy.hp) / 100, 8);
      ctx.strokeStyle = "rgba(255,255,255,0.85)";
      ctx.lineWidth = 1;
      ctx.strokeRect(4, 8, 120, 8);
      enemy.hpTexture.needsUpdate = true;
    }

    const spawnPoints = [
      [-22, -22], [22, -22], [-22, 22], [22, 22],
      [0, -30], [0, 30], [-30, 0], [30, 0]
    ];

    for (const [x, z] of spawnPoints) {
      const zombie = makeZombie(x, z);
      drawEnemyHp(zombie);
      state.enemies.push(zombie);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playGunSound(w) {
      if (audioCtx.state === "suspended") audioCtx.resume();

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = "square";
      osc.frequency.setValueAtTime(w.soundBase, now);
      osc.frequency.exponentialRampToValueAtTime(w.soundBase * 0.45, now + 0.08);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(2200, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.10, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.12);
    }

    function createBulletMark(point, normal) {
      if (decalGroup.children.length > 140) {
        const old = decalGroup.children[0];
        decalGroup.remove(old);
        old.geometry.dispose();
        old.material.dispose();
      }

      const mark = new THREE.Mesh(
        new THREE.CircleGeometry(0.08, 12),
        new THREE.MeshBasicMaterial({
          color: 0x1a1a1a,
          transparent: true,
          opacity: 0.85
        })
      );

      mark.position.copy(point).add(normal.clone().multiplyScalar(0.01));
      mark.lookAt(point.clone().add(normal));
      decalGroup.add(mark);
    }

    function createSparks(point, color = 0xffdd88) {
      for (let i = 0; i < 5; i++) {
        const geo = new THREE.SphereGeometry(0.025, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ color });
        const spark = new THREE.Mesh(geo, mat);
        spark.position.copy(point);
        spark.userData.vel = new THREE.Vector3(
          (Math.random() - 0.5) * 2.4,
          Math.random() * 1.8,
          (Math.random() - 0.5) * 2.4
        );
        spark.userData.life = 0.18;
        sparkGroup.add(spark);
      }
    }

    function updateSparks(dt) {
      const dead = [];
      sparkGroup.children.forEach((spark) => {
        spark.userData.life -= dt;
        spark.position.addScaledVector(spark.userData.vel, dt);
        spark.userData.vel.y -= 8 * dt;
        if (spark.userData.life <= 0) dead.push(spark);
      });

      for (const spark of dead) {
        sparkGroup.remove(spark);
        spark.geometry.dispose();
        spark.material.dispose();
      }
    }

    function createTracer(start, end, color) {
      const geometry = new THREE.BufferGeometry().setFromPoints([start, end]);
      const material = new THREE.LineBasicMaterial({
        color,
        transparent: true,
        opacity: 1
      });
      const line = new THREE.Line(geometry, material);
      tracerGroup.add(line);
      state.tracers.push({ line, material, life: 0.08, maxLife: 0.08 });
    }

    camera.position.copy(player.position);
    scene.add(camera);

    const weaponRoot = new THREE.Group();
    camera.add(weaponRoot);

    function makeWeaponModel(type) {
      const root = new THREE.Group();

      const rightHand = new THREE.Mesh(
        new THREE.BoxGeometry(0.18, 0.18, 0.42),
        new THREE.MeshStandardMaterial({ color: 0xc89d7c })
      );
      rightHand.position.set(0.34, -0.34, -0.5);
      root.add(rightHand);

      const leftHand = new THREE.Mesh(
        new THREE.BoxGeometry(0.14, 0.14, 0.32),
        new THREE.MeshStandardMaterial({ color: 0xb98562 })
      );
      leftHand.position.set(0.12, -0.28, -0.42);
      root.add(leftHand);

      let gunGroup = new THREE.Group();

      if (type === 0) {
        const frame = new THREE.Mesh(
          new THREE.BoxGeometry(0.12, 0.16, 0.46),
          new THREE.MeshStandardMaterial({ color: 0x3b4450 })
        );
        gunGroup.add(frame);

        const slide = new THREE.Mesh(
          new THREE.BoxGeometry(0.11, 0.06, 0.24),
          new THREE.MeshStandardMaterial({ color: 0x8891a0 })
        );
        slide.position.set(0, 0.08, -0.05);
        gunGroup.add(slide);

        const grip = new THREE.Mesh(
          new THREE.BoxGeometry(0.10, 0.22, 0.12),
          new THREE.MeshStandardMaterial({ color: 0x20242c })
        );
        grip.position.set(0, -0.17, 0.08);
        gunGroup.add(grip);

        gunGroup.position.set(0.28, -0.22, -0.70);
      } else if (type === 1) {
        const body = new THREE.Mesh(
          new THREE.BoxGeometry(0.14, 0.16, 0.90),
          new THREE.MeshStandardMaterial({ color: 0x374151 })
        );
        gunGroup.add(body);

        const upper = new THREE.Mesh(
          new THREE.BoxGeometry(0.10, 0.06, 0.52),
          new THREE.MeshStandardMaterial({ color: 0x1f2937 })
        );
        upper.position.set(0, 0.08, -0.05);
        gunGroup.add(upper);

        const stock = new THREE.Mesh(
          new THREE.BoxGeometry(0.12, 0.16, 0.26),
          new THREE.MeshStandardMaterial({ color: 0x222831 })
        );
        stock.position.set(0, 0, 0.52);
        gunGroup.add(stock);

        const grip = new THREE.Mesh(
          new THREE.BoxGeometry(0.10, 0.24, 0.12),
          new THREE.MeshStandardMaterial({ color: 0x1f2937 })
        );
        grip.position.set(0, -0.18, 0.12);
        gunGroup.add(grip);

        const mag = new THREE.Mesh(
          new THREE.BoxGeometry(0.08, 0.30, 0.12),
          new THREE.MeshStandardMaterial({ color: 0x20242c })
        );
        mag.position.set(0, -0.16, 0.00);
        gunGroup.add(mag);

        const frontSight = new THREE.Mesh(
          new THREE.BoxGeometry(0.04, 0.08, 0.04),
          new THREE.MeshStandardMaterial({ color: 0xaeb6c2 })
        );
        frontSight.position.set(0, 0.10, -0.42);
        gunGroup.add(frontSight);

        gunGroup.userData.mag = mag;
        gunGroup.position.set(0.25, -0.22, -0.80);
      } else {
        const body = new THREE.Mesh(
          new THREE.BoxGeometry(0.18, 0.16, 0.92),
          new THREE.MeshStandardMaterial({ color: 0x6b7280 })
        );
        gunGroup.add(body);

        const pump = new THREE.Mesh(
          new THREE.BoxGeometry(0.16, 0.10, 0.24),
          new THREE.MeshStandardMaterial({ color: 0x7c5a3a })
        );
        pump.position.set(0, -0.08, -0.1);
        gunGroup.add(pump);

        const stock = new THREE.Mesh(
          new THREE.BoxGeometry(0.16, 0.16, 0.26),
          new THREE.MeshStandardMaterial({ color: 0x5d4633 })
        );
        stock.position.set(0, 0, 0.48);
        gunGroup.add(stock);

        gunGroup.position.set(0.23, -0.20, -0.82);
      }

      root.add(gunGroup);

      const barrel = new THREE.Mesh(
        new THREE.BoxGeometry(0.04, 0.04, 0.26),
        new THREE.MeshStandardMaterial({ color: 0xd1d5db })
      );
      barrel.position.copy(gunGroup.position).add(new THREE.Vector3(0, 0, -0.50));
      root.add(barrel);

      root.userData.barrel = barrel;
      root.userData.gun = gunGroup;
      return root;
    }

    const weaponModels = [
      makeWeaponModel(0),
      makeWeaponModel(1),
      makeWeaponModel(2)
    ];

    weaponModels.forEach((w, i) => {
      w.visible = i === state.weaponIndex;
      weaponRoot.add(w);
    });

    function setWeapon(index) {
      state.weaponIndex = index;
      weaponModels.forEach((w, i) => {
        w.visible = i === index;
      });
      updateHud();
    }

    function startReload() {
      const w = weapon();
      if (state.reloading) return;
      if (w.ammo >= w.magSize) return;
      state.reloading = true;
      state.reloadEnd = performance.now() + w.reloadTime;
      updateHud();
    }

    document.addEventListener("keydown", (e) => {
      const k = e.key.toLowerCase();
      if (k === "w") keys.w = true;
      if (k === "a") keys.a = true;
      if (k === "s") keys.s = true;
      if (k === "d") keys.d = true;
      if (k === " ") keys.space = true;
      if (k === "1") setWeapon(0);
      if (k === "2") setWeapon(1);
      if (k === "3") setWeapon(2);
      if (k === "r") startReload();
    });

    document.addEventListener("keyup", (e) => {
      const k = e.key.toLowerCase();
      if (k === "w") keys.w = false;
      if (k === "a") keys.a = false;
      if (k === "s") keys.s = false;
      if (k === "d") keys.d = false;
      if (k === " ") keys.space = false;
    });

    renderer.domElement.addEventListener("mousedown", () => {
      if (!state.locked) {
        renderer.domElement.requestPointerLock();
        return;
      }
      state.mouseDown = true;
      tryShoot();
    });

    document.addEventListener("mouseup", () => {
      state.mouseDown = false;
    });

    renderer.domElement.addEventListener("click", () => {
      if (!state.locked) {
        renderer.domElement.requestPointerLock();
      }
    });

    document.addEventListener("pointerlockchange", () => {
      state.locked = document.pointerLockElement === renderer.domElement;
      hint.style.display = state.locked ? "none" : "block";
    });

    document.addEventListener("mousemove", (e) => {
      if (!state.locked || player.health <= 0) return;

      player.yaw -= e.movementX * 0.004;
      player.pitch -= e.movementY * 0.0032;

      const limit = Math.PI / 2 - 0.01;
      player.pitch = Math.max(-limit, Math.min(limit, player.pitch));
    });

    function updatePlayer(dt) {
      camera.rotation.y = player.yaw;
      camera.rotation.x = player.pitch;

      const forward = new THREE.Vector3(0, 0, -1)
        .applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);
      const right = new THREE.Vector3(1, 0, 0)
        .applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);

      const move = new THREE.Vector3();
      if (keys.w) move.add(forward);
      if (keys.s) move.sub(forward);
      if (keys.d) move.add(right);
      if (keys.a) move.sub(right);

      if (move.lengthSq() > 0) {
        move.normalize().multiplyScalar(player.speed * dt);
        const next = player.position.clone().add(new THREE.Vector3(move.x, 0, move.z));
        const resolved = resolveWallSliding(next);
        player.position.x = resolved.x;
        player.position.z = resolved.z;
      }

      if (keys.space && player.onGround) {
        player.velocityY = 5.8;
        player.onGround = false;
      }

      player.velocityY -= 14 * dt;
      player.position.y += player.velocityY * dt;

      if (player.position.y <= 1.65) {
        player.position.y = 1.65;
        player.velocityY = 0;
        player.onGround = true;
      }

      const movingNow = keys.w || keys.a || keys.s || keys.d;
      const headBob = (movingNow && player.onGround)
        ? Math.abs(Math.sin(performance.now() * 0.012)) * 0.02
        : 0;

      camera.position.copy(player.position);
      camera.position.y += headBob;
    }

    function updateEnemies(dt) {
      const playerRadius = player.radius;
      const enemyRadius = 0.34;
      const stopGap = 0.08;
      const stopDistance = playerRadius + enemyRadius + stopGap;
      const attackDistance = stopDistance + 0.30;

      function enemyHitsWall(pos) {
        const sphere = new THREE.Sphere(new THREE.Vector3(pos.x, 1.0, pos.z), enemyRadius);
        for (const box of wallBoxes) {
          if (box.intersectsSphere(sphere)) return true;
        }
        return false;
      }

      function unstickEnemy(enemy) {
        if (!enemyHitsWall(enemy.group.position)) return;

        const tries = [
          new THREE.Vector3( 0.18, 0, 0),
          new THREE.Vector3(-0.18, 0, 0),
          new THREE.Vector3(0, 0,  0.18),
          new THREE.Vector3(0, 0, -0.18),
          new THREE.Vector3( 0.18, 0,  0.18),
          new THREE.Vector3(-0.18, 0,  0.18),
          new THREE.Vector3( 0.18, 0, -0.18),
          new THREE.Vector3(-0.18, 0, -0.18),
          new THREE.Vector3( 0.32, 0, 0),
          new THREE.Vector3(-0.32, 0, 0),
          new THREE.Vector3(0, 0,  0.32),
          new THREE.Vector3(0, 0, -0.32)
        ];

        for (const offset of tries) {
          const test = enemy.group.position.clone().add(offset);
          if (!enemyHitsWall(test)) {
            enemy.group.position.copy(test);
            return;
          }
        }
      }

      for (const enemy of state.enemies) {
        if (!enemy.alive) {
          enemy.group.visible = false;
          enemy.hpSprite.visible = false;
          enemy.respawnTimer -= dt;

          if (enemy.respawnTimer <= 0) {
            enemy.alive = true;
            enemy.hp = 100;
            enemy.group.position.copy(enemy.spawn);
            enemy.group.visible = true;
            enemy.hpSprite.visible = true;
            enemy.walkTime = Math.random() * 10;
            enemy.moving = false;
            enemy.attackPhase = 0;
            drawEnemyHp(enemy);
          }
          continue;
        }

        drawEnemyHp(enemy);
        unstickEnemy(enemy);

        const dx = player.position.x - enemy.group.position.x;
        const dz = player.position.z - enemy.group.position.z;
        const flatDist = Math.sqrt(dx * dx + dz * dz);

        if (enemy.attackCooldown > 0) {
          enemy.attackCooldown -= dt;
        }

        enemy.moving = false;

        if (flatDist > stopDistance) {
          const dirX = dx / flatDist;
          const dirZ = dz / flatDist;
          const moveSpeed = 1.7;

          const targetX = player.position.x - dirX * stopDistance;
          const targetZ = player.position.z - dirZ * stopDistance;

          const toTargetX = targetX - enemy.group.position.x;
          const toTargetZ = targetZ - enemy.group.position.z;
          const toTargetDist = Math.sqrt(toTargetX * toTargetX + toTargetZ * toTargetZ);

          if (toTargetDist > 0.001) {
            const stepX = (toTargetX / toTargetDist) * moveSpeed * dt;
            const stepZ = (toTargetZ / toTargetDist) * moveSpeed * dt;

            const nextX = enemy.group.position.clone();
            nextX.x += stepX;

            const nextZ = enemy.group.position.clone();
            nextZ.z += stepZ;

            const xDistToPlayer = Math.sqrt(
              (nextX.x - player.position.x) ** 2 +
              (enemy.group.position.z - player.position.z) ** 2
            );

            const zDistToPlayer = Math.sqrt(
              (enemy.group.position.x - player.position.x) ** 2 +
              (nextZ.z - player.position.z) ** 2
            );

            if (!enemyHitsWall(nextX) && xDistToPlayer >= stopDistance) {
              enemy.group.position.x = nextX.x;
              enemy.moving = true;
            }

            if (!enemyHitsWall(nextZ) && zDistToPlayer >= stopDistance) {
              enemy.group.position.z = nextZ.z;
              enemy.moving = true;
            }

            if (enemy.moving) {
              enemy.walkTime += dt * 4.6;
            }
          }
        }

        const faceAngle = Math.atan2(
          player.position.x - enemy.group.position.x,
          player.position.z - enemy.group.position.z
        );
        enemy.group.rotation.y = faceAngle;

        const walkSwing = enemy.moving ? Math.sin(enemy.walkTime) * 0.22 : 0;
        const bodyBob = enemy.moving ? Math.abs(Math.sin(enemy.walkTime * 2)) * 0.018 : 0;

        if (flatDist < attackDistance) {
          enemy.attackPhase += dt * 4.2;
        } else {
          enemy.attackPhase = 0;
        }

        const attackSwing = flatDist < attackDistance
          ? Math.max(0, Math.sin(enemy.attackPhase)) * 0.30
          : 0;

        enemy.leftArmRoot.rotation.x = -1.0 + attackSwing + walkSwing * 0.12;
        enemy.rightArmRoot.rotation.x = -1.0 + attackSwing - walkSwing * 0.12;

        enemy.leftLegRoot.rotation.x = -walkSwing;
        enemy.rightLegRoot.rotation.x = walkSwing;

        enemy.torsoRoot.position.y = bodyBob;
        enemy.hpSprite.position.y = 2.75 + bodyBob;

        if (flatDist < attackDistance && enemy.attackCooldown <= 0) {
          player.health -= 8;
          enemy.attackCooldown = 0.48;
          state.flashTimer = 0.12;
          updateHud();
        }
      }
    }

    const raycaster = new THREE.Raycaster();

    function getWeaponDirection(totalSpread = 0) {
      const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);

      if (totalSpread > 0) {
        const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
        const up = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
        dir.add(right.multiplyScalar((Math.random() - 0.5) * totalSpread));
        dir.add(up.multiplyScalar((Math.random() - 0.5) * totalSpread));
        dir.normalize();
      }

      return dir;
    }

    function getBodyZone(enemy, hitPoint) {
      const local = enemy.group.worldToLocal(hitPoint.clone());
      if (local.y > 1.48) return "head";
      if (local.y < 0.85) return "legs";
      return "body";
    }

    function applyDamage(enemy, zone) {
      const w = weapon();
      if (zone === "head") enemy.hp -= w.damageHead;
      else if (zone === "legs") enemy.hp -= w.damageLegs;
      else enemy.hp -= w.damageBody;

      if (enemy.hp <= 0) {
        enemy.alive = false;
        enemy.respawnTimer = 3.5;
        state.score += 1;
      }

      updateHud();
    }

    function tryShoot() {
      const now = performance.now();
      const w = weapon();

      if (state.reloading) return;
      if (w.ammo <= 0) {
        startReload();
        return;
      }
      if (now - state.lastShot < w.fireDelay) return;

      state.lastShot = now;
      w.ammo -= 1;

      state.recoil = w.recoil;
      state.spreadBloom = Math.min(
        w.spreadBloomMax,
        state.spreadBloom + w.spreadBloomAdd
      );

      playGunSound(w);

      const activeWeapon = weaponModels[state.weaponIndex];
      const barrel = activeWeapon.userData.barrel;
      const muzzleStart = barrel.getWorldPosition(new THREE.Vector3());

      for (let i = 0; i < w.pellets; i++) {
        const totalSpread = w.spreadBase + state.spreadBloom;
        const dir = getWeaponDirection(totalSpread);

        raycaster.set(camera.position, dir);
        raycaster.far = 160;

        const wallHits = raycaster.intersectObjects(wallMeshes, false);
        let wallDistance = Infinity;
        let wallPoint = null;
        let wallNormal = null;

        if (wallHits.length > 0) {
          wallDistance = wallHits[0].distance;
          wallPoint = wallHits[0].point.clone();
          wallNormal = wallHits[0].face.normal.clone().transformDirection(wallHits[0].object.matrixWorld);
        }

        let bestEnemy = null;
        let bestHit = null;

        for (const enemy of state.enemies) {
          if (!enemy.alive) continue;
          const parts = [enemy.head, enemy.body, enemy.legL, enemy.legR];
          const hits = raycaster.intersectObjects(parts, false);
          if (hits.length > 0) {
            const hit = hits[0];
            if (hit.distance < wallDistance && (!bestHit || hit.distance < bestHit.distance)) {
              bestEnemy = enemy;
              bestHit = hit;
            }
          }
        }

        if (bestEnemy && bestHit) {
          const zone = getBodyZone(bestEnemy, bestHit.point);
          applyDamage(bestEnemy, zone);
          createTracer(muzzleStart, bestHit.point.clone(), w.color);
          createSparks(bestHit.point.clone(), 0xff8844);
        } else if (wallPoint) {
          createTracer(muzzleStart, wallPoint, w.color);
          createBulletMark(wallPoint, wallNormal || new THREE.Vector3(0, 1, 0));
          createSparks(wallPoint.clone());
        } else {
          createTracer(
            muzzleStart,
            muzzleStart.clone().add(dir.multiplyScalar(50)),
            w.color
          );
        }
      }

      updateHud();
    }

    function updateWeaponVisuals(dt, isMoving) {
      const t = performance.now() * 0.001;

      let bobX = 0;
      let bobY = 0;
      let bobRotZ = 0;

      if (isMoving && player.onGround) {
        bobX = Math.sin(t * 5.5) * 0.005;
        bobY = Math.abs(Math.cos(t * 11)) * 0.007;
        bobRotZ = Math.sin(t * 5.5) * 0.008;
      }

      let reloadX = 0;
      let reloadY = 0;
      let reloadRotZ = 0;
      let reloadRotY = 0;

      if (state.reloading) {
        const total = weapon().reloadTime;
        const remaining = state.reloadEnd - performance.now();
        const progress = THREE.MathUtils.clamp(1 - remaining / total, 0, 1);

        if (progress < 0.25) {
          const p = progress / 0.25;
          reloadRotZ = -1.0 * p;
          reloadRotY = -0.35 * p;
          reloadY = 0.08 * p;
        } else if (progress < 0.8) {
          const p = (progress - 0.25) / 0.55;
          reloadRotZ = -1.0;
          reloadRotY = -0.35;
          reloadY = 0.08 + Math.sin(p * Math.PI * 3) * 0.05;
          reloadX = -0.03;
        } else {
          const p = (progress - 0.8) / 0.2;
          reloadRotZ = -1.0 * (1 - p);
          reloadRotY = -0.35 * (1 - p);
          reloadY = 0.08 * (1 - p);
        }
      }

      weaponRoot.position.set(bobX + reloadX, -state.recoil - bobY + reloadY, 0);
      weaponRoot.rotation.set(
        state.recoil * 1.0,
        reloadRotY,
        bobRotZ + reloadRotZ
      );
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    const clock = new THREE.Clock();

    function animate() {
      const dt = Math.min(clock.getDelta(), 0.033);

      if (player.health > 0) {
        updatePlayer(dt);
        updateEnemies(dt);

        if (state.mouseDown && weapon().auto) {
          tryShoot();
        }
      }

      if (state.reloading && performance.now() >= state.reloadEnd) {
        state.reloading = false;
        weapon().ammo = weapon().magSize;
        updateHud();
      }

      if (state.flashTimer > 0) {
        state.flashTimer -= dt;
        flash.style.background = "rgba(255,0,0,0.18)";
      } else {
        flash.style.background = "rgba(255,0,0,0)";
      }

      state.recoil *= 0.82;
      if (state.recoil < 0.001) state.recoil = 0;

      state.spreadBloom = Math.max(
        0,
        state.spreadBloom - weapon().recover * dt * 60
      );

      const isMoving = keys.w || keys.a || keys.s || keys.d;
      updateWeaponVisuals(dt, isMoving);
      updateSparks(dt);

      for (const t of state.tracers) {
        t.life -= dt;
        t.material.opacity = Math.max(0, t.life / t.maxLife);
      }

      state.tracers = state.tracers.filter((t) => {
        if (t.life <= 0) {
          tracerGroup.remove(t.line);
          t.line.geometry.dispose();
          t.material.dispose();
          return false;
        }
        return true;
      });

      if (player.health <= 0) {
        hint.style.display = "block";
        hint.textContent = "GAME OVER - 刷新页面重新开始";
      }

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
