<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Zombie FPS Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Audiowide', Arial, sans-serif;
      color: #fff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      cursor: none;
    }

    .hud {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.5;
      user-select: none;
      pointer-events: none;
      min-width: 340px;
      font-size: 14px;
      backdrop-filter: blur(4px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.28);
    }

    .hint {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      background: rgba(0, 0, 0, 0.75);
      padding: 14px 18px;
      border-radius: 12px;
      pointer-events: none;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    .flash {
      position: fixed;
      inset: 0;
      background: rgba(255, 0, 0, 0);
      pointer-events: none;
      z-index: 10;
    }

    .crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 25;
      opacity: 1;
      transition: opacity 0.12s ease;
    }

    .crosshair.hidden {
      opacity: 0;
    }

    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 0 6px rgba(255,255,255,0.5);
    }

    .crosshair::before {
      left: 8px;
      top: 0;
      width: 2px;
      height: 18px;
    }

    .crosshair::after {
      left: 0;
      top: 8px;
      width: 18px;
      height: 2px;
    }

    .hitmarker {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 26px;
      height: 26px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 28;
      opacity: 0;
      transition: opacity 0.08s linear;
    }

    .hitmarker.show {
      opacity: 1;
    }

    .hitmarker::before,
    .hitmarker::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 22px;
      background: rgba(255,255,255,0.9);
      transform-origin: center center;
      box-shadow: 0 0 6px rgba(255,255,255,0.45);
    }

    .hitmarker::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .hitmarker::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .menu {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      background: radial-gradient(circle at center, #182136 0%, #0b0f18 75%);
    }

    .menu h1 {
      margin: 0 0 8px 0;
      font-size: 40px;
    }

    .menu p {
      margin: 0 0 18px 0;
      opacity: 0.8;
    }

    .menu button {
      width: 220px;
      padding: 14px 18px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
      color: #111827;
      font-weight: 600;
      font-family: 'Audiowide', sans-serif;
    }

    .overlay-btn {
      width: 200px;
      padding: 12px 16px;
      font-family: 'Audiowide', sans-serif;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      color: #fff;
      letter-spacing: 2px;
      backdrop-filter: blur(4px);
      transition: background 0.15s, border-color 0.15s;
    }
    .overlay-btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div id="menu" class="menu">
    <div id="menuMain" style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <h1>3D Zombie FPS</h1>
      <p>by Tintly555 and JimmyQrg</p>
      <button id="btnArena">Zombie Arena</button>
      <button id="btnCrossfire">Crossfire</button>
    </div>
    <div id="menuArenaMode" style="display:none;flex-direction:column;align-items:center;gap:10px;">
      <h2 style="font-family:'Audiowide',sans-serif;font-size:28px;margin:0 0 14px 0;letter-spacing:3px;">ZOMBIE ARENA</h2>
      <button id="btnArenaSingle">SINGLEPLAYER</button>
      <button id="btnArenaCoop">CO-OP MODE</button>
      <button id="btnArenaBack" style="margin-top:6px;font-size:14px;">← BACK</button>
    </div>
    <div id="menuLobby" style="display:none;flex-direction:column;align-items:center;gap:10px;">
      <h2 id="lobbyTitle" style="font-family:'Audiowide',sans-serif;font-size:24px;margin:0 0 10px 0;letter-spacing:2px;">MULTIPLAYER</h2>
      <button id="btnQuickplay">QUICK PLAY</button>
      <button id="btnCreateRoom">CREATE A ROOM</button>
      <button id="btnJoinCode">JOIN VIA CODE</button>
      <button id="btnLobbyBack" style="margin-top:6px;font-size:14px;">← BACK</button>
    </div>
    <div id="menuJoinCode" style="display:none;flex-direction:column;align-items:center;gap:10px;">
      <h2 style="font-family:'Audiowide',sans-serif;font-size:24px;margin:0 0 6px 0;letter-spacing:2px;">JOIN VIA CODE</h2>
      <input id="codeInput" type="text" maxlength="10" placeholder="ROOM CODE" style="font-family:'Audiowide',sans-serif;width:180px;padding:10px 14px;font-size:18px;border:2px solid #4fd1ff;border-radius:8px;background:#0d111b;color:#fff;outline:none;text-align:center;text-transform:uppercase;letter-spacing:4px;">
      <p id="codeError" style="font-family:'Audiowide',sans-serif;color:#e53e3e;font-size:13px;margin:4px 0 0 0;min-height:18px;"></p>
      <button id="btnCodeJoin">JOIN</button>
      <button id="btnCodeBack" style="font-size:14px;">← BACK</button>
    </div>
  </div>

  <div id="app"></div>
  <div class="hud" id="hud"></div>
  <div class="hint" id="hint">Click anywhere</div>
  <div class="flash" id="flash"></div>
  <div class="crosshair" id="crosshair"></div>
  <div class="hitmarker" id="hitmarker"></div>
  <div id="deathOverlay" style="position:fixed;inset:0;z-index:50;pointer-events:none;display:none;">
    <div id="deathFade" style="position:absolute;inset:0;background:rgba(0,0,0,0);transition:none;"></div>
    <div id="deathUI" style="position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;gap:14px;pointer-events:auto;">
      <h1 id="deathTitle" style="font-family:'Audiowide',sans-serif;font-size:52px;margin:0 0 6px 0;color:#e53e3e;text-shadow:0 0 30px rgba(229,62,62,0.5);letter-spacing:4px;">DEFEAT</h1>
      <p id="deathScore" style="font-family:'Audiowide',sans-serif;font-size:16px;margin:0 0 18px 0;opacity:0.8;">Score: 0</p>
      <button class="overlay-btn" id="btnDeathRestart">RESTART</button>
      <button class="overlay-btn" id="btnDeathQuit">QUIT</button>
    </div>
  </div>
  <div id="pauseOverlay" style="position:fixed;inset:0;z-index:55;display:none;flex-direction:column;justify-content:center;align-items:center;gap:14px;background:rgba(0,0,0,0.5);">
    <h1 style="font-family:'Audiowide',sans-serif;font-size:48px;margin:0 0 10px 0;color:#fff;letter-spacing:4px;">PAUSED</h1>
    <button class="overlay-btn" id="btnResume">RESUME</button>
    <button class="overlay-btn" id="btnPauseRestart" style="display:none;">RESTART</button>
    <button class="overlay-btn" id="btnPauseQuit">QUIT</button>
  </div>
  <div id="chatBox" style="position:fixed;bottom:10px;left:10px;z-index:40;pointer-events:none;font-family:'Audiowide',sans-serif;display:flex;flex-direction:column;justify-content:flex-end;">
    <div id="chatMessages" style="display:flex;flex-direction:column;gap:2px;margin-bottom:6px;overflow:hidden;"></div>
    <div id="chatInputWrap" style="display:none;pointer-events:auto;">
      <input id="chatInput" type="text" maxlength="200" placeholder="Type a message..." style="font-family:'Audiowide',sans-serif;width:280px;padding:6px 10px;font-size:13px;border:1px solid rgba(79,209,255,0.5);border-radius:6px;background:rgba(13,17,27,0.8);color:#fff;outline:none;">
    </div>
  </div>
  <div id="hitDirContainer" style="position:fixed;inset:0;z-index:35;pointer-events:none;display:flex;justify-content:center;align-items:center;"></div>
  <div id="nameModal" style="position:fixed;inset:0;z-index:65;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,0.7);">
    <div style="background:#1a2236;border-radius:14px;padding:32px 38px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.5);">
      <h2 style="font-family:'Audiowide',sans-serif;margin:0 0 16px 0;font-size:22px;">ENTER YOUR NAME</h2>
      <input id="nameInput" type="text" maxlength="16" placeholder="Player" style="font-family:'Audiowide',sans-serif;width:200px;padding:10px 14px;font-size:16px;border:2px solid #4fd1ff;border-radius:8px;background:#0d111b;color:#fff;outline:none;text-align:center;">
      <br>
      <button class="overlay-btn" id="btnNameOk" style="margin-top:16px;">JOIN</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4/dist/socket.io.min.js"></script>
  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js";

    const app = document.getElementById("app");
    const hud = document.getElementById("hud");
    const hint = document.getElementById("hint");
    const flash = document.getElementById("flash");
    const crosshairEl = document.getElementById("crosshair");
    const hitmarkerEl = document.getElementById("hitmarker");
    const menuEl = document.getElementById("menu");
    const menuMain = document.getElementById("menuMain");
    const menuArenaMode = document.getElementById("menuArenaMode");
    const menuLobby = document.getElementById("menuLobby");
    const lobbyTitle = document.getElementById("lobbyTitle");
    const menuJoinCode = document.getElementById("menuJoinCode");
    const codeInput = document.getElementById("codeInput");
    const codeError = document.getElementById("codeError");
    const btnArena = document.getElementById("btnArena");
    const btnCrossfire = document.getElementById("btnCrossfire");
    const btnArenaSingle = document.getElementById("btnArenaSingle");
    const btnArenaCoop = document.getElementById("btnArenaCoop");
    const btnArenaBack = document.getElementById("btnArenaBack");
    const btnQuickplay = document.getElementById("btnQuickplay");
    const btnCreateRoom = document.getElementById("btnCreateRoom");
    const btnJoinCode = document.getElementById("btnJoinCode");
    const btnLobbyBack = document.getElementById("btnLobbyBack");
    const btnCodeJoin = document.getElementById("btnCodeJoin");
    const btnCodeBack = document.getElementById("btnCodeBack");
    const deathOverlay = document.getElementById("deathOverlay");
    const deathFade = document.getElementById("deathFade");
    const deathUI = document.getElementById("deathUI");
    const deathTitle = document.getElementById("deathTitle");
    const deathScore = document.getElementById("deathScore");
    const btnDeathRestart = document.getElementById("btnDeathRestart");
    const btnDeathQuit = document.getElementById("btnDeathQuit");
    const pauseOverlay = document.getElementById("pauseOverlay");
    const btnResume = document.getElementById("btnResume");
    const btnPauseRestart = document.getElementById("btnPauseRestart");
    const btnPauseQuit = document.getElementById("btnPauseQuit");
    const nameModal = document.getElementById("nameModal");
    const nameInput = document.getElementById("nameInput");
    const btnNameOk = document.getElementById("btnNameOk");
    const chatBox = document.getElementById("chatBox");
    const chatMessages = document.getElementById("chatMessages");
    const chatInputWrap = document.getElementById("chatInputWrap");
    const chatInput = document.getElementById("chatInput");
    const hitDirContainer = document.getElementById("hitDirContainer");
    let CURRENT_MAP = "arena";
    let MULTIPLAYER = false;
    let ROOM_CODE = "";
    let pendingLobbyMode = "";
    let started = false;
    let paused = false;
    let chatOpen = false;
    let playerName = "Player";
    let killerEnemy = null;
    const hitIndicators = [];
    let deathAnimTime = 0;
    const DEATH_ANIM_DURATION = 2.0;
    let deathCamYaw = 0;
    let deathCamPitch = 0;
    let deathBaseFov = 75;
    const socket = io("https://chat.jimmyqrg.com/game");
    let activeRoomId = "";

    const remotePlayers = new Map();

    socket.on("connect", () => {
      console.log("Connected to server:", socket.id);
    });
    socket.on("enemyMove", (data) => {
      let rp = remotePlayers.get(data.id);
      if (!rp) {
        rp = createRemotePlayer(data.name);
        remotePlayers.set(data.id, rp);
        scene.add(rp.group);
      }
      rp.x = data.x;
      rp.y = data.y;
      rp.z = data.z;
      rp.yaw = data.yaw || 0;
      if (data.name && data.name !== rp.name) {
        rp.name = data.name;
        updateNameSprite(rp, data.name);
      }
      if (data.weapon != null && data.weapon !== rp.currentWeapon) {
        rp.rightArm.remove(rp.gunModel);
        rp.gunModel = makeThirdPersonGun(data.weapon);
        rp.gunModel.position.set(0.15, -0.42, -0.28);
        rp.rightArm.add(rp.gunModel);
        rp.currentWeapon = data.weapon;
      }
      rp.group.visible = true;
    });

    socket.on("enemyLeft", (data) => {
      const rp = remotePlayers.get(data.id);
      if (rp) {
        scene.remove(rp.group);
        remotePlayers.delete(data.id);
      }
    });

    socket.on("enemyShoot", (data) => {
      const pt = new THREE.Vector3(data.x, data.y, data.z);
      if (data.type === "blood") {
        createBlood(pt);
      } else {
        createSparks(pt, data.color || 0xffdd88);
        const n = new THREE.Vector3(data.nx, data.ny, data.nz);
        if (n.lengthSq() > 0) createBulletMark(pt, n);
      }
    });

    socket.on("chat", (data) => {
      const rp = remotePlayers.get(data.id);
      const who = data.id === socket.id ? playerName : (rp ? rp.name : "???");
      addChatMessage(who, data.text);
    });

    socket.on("damaged", (data) => {
      if (player.health <= 0) return;
      player.health = Math.max(0, player.health - (data.damage || 0));
      player.regenTimer = 0;
      state.flashTimer = 0.14;
      addHitIndicator(data.x || 0, data.z || 0);
      updateHud();
      if (player.health <= 0) {
        showDeathScreen(null);
      }
    });

    const CHAT_MAX_VISIBLE = 6;
    const CHAT_MSG_LIFETIME = 12000;
    const chatLog = [];

    function addChatMessage(who, text) {
      const el = document.createElement("div");
      el.style.cssText = "font-size:12px;color:#fff;background:rgba(0,0,0,0.45);padding:3px 8px;border-radius:4px;max-width:300px;word-break:break-word;transition:opacity 0.4s;";
      el.textContent = `${who}: ${text}`;
      chatMessages.appendChild(el);
      const entry = { el, born: performance.now() };
      chatLog.push(entry);
      if (chatLog.length > 80) {
        const old = chatLog.shift();
        if (old.el.parentNode) chatMessages.removeChild(old.el);
      }
      refreshChatVisibility();
    }

    function refreshChatVisibility() {
      const now = performance.now();
      if (chatOpen) {
        chatMessages.style.maxHeight = "260px";
        chatMessages.style.overflow = "auto";
        chatMessages.style.pointerEvents = "auto";
        for (const e of chatLog) e.el.style.opacity = "1";
        chatMessages.scrollTop = chatMessages.scrollHeight;
      } else {
        chatMessages.style.maxHeight = "";
        chatMessages.style.overflow = "hidden";
        chatMessages.style.pointerEvents = "none";
        let shown = 0;
        for (let i = chatLog.length - 1; i >= 0; i--) {
          const e = chatLog[i];
          const alive = (now - e.born) < CHAT_MSG_LIFETIME;
          if (alive && shown < CHAT_MAX_VISIBLE) {
            e.el.style.opacity = "1";
            e.el.style.display = "";
            shown++;
          } else {
            e.el.style.opacity = "0";
            e.el.style.display = "none";
          }
        }
      }
    }

    function openChat() {
      if (chatOpen) return;
      chatOpen = true;
      chatInputWrap.style.display = "block";
      chatInput.value = "";
      chatInput.focus();
      refreshChatVisibility();
    }

    function closeChat() {
      if (!chatOpen) return;
      chatOpen = false;
      chatInputWrap.style.display = "none";
      refreshChatVisibility();
    }

    function sendChat() {
      const text = chatInput.value.trim();
      if (text && MULTIPLAYER) {
        socket.emit("chat", text);
      } else if (text) {
        addChatMessage(playerName, text);
      }
      closeChat();
      renderer.domElement.requestPointerLock();
    }

    function addHitIndicator(fromX, fromZ) {
      const dx = fromX - player.position.x;
      const dz = fromZ - player.position.z;
      const worldAngle = Math.atan2(dx, dz);
      const relAngle = worldAngle - player.yaw;
      const el = document.createElement("div");
      el.style.cssText = "position:absolute;width:60px;height:12px;border-radius:6px;background:rgba(255,40,40,0.7);pointer-events:none;transition:opacity 0.3s;";
      hitDirContainer.appendChild(el);
      const indicator = { el, relAngle, life: 1.5 };
      hitIndicators.push(indicator);
      updateHitIndicatorPos(indicator);
    }

    function updateHitIndicatorPos(ind) {
      const angle = ind.relAngle;
      const r = 90;
      const cx = r * Math.sin(angle);
      const cy = -r * Math.cos(angle);
      ind.el.style.transform = `translate(${cx - 30}px, ${cy - 6}px) rotate(${angle}rad)`;
    }

    function updateHitIndicators(dt) {
      for (let i = hitIndicators.length - 1; i >= 0; i--) {
        const ind = hitIndicators[i];
        ind.life -= dt;
        ind.el.style.opacity = Math.max(0, ind.life / 1.5).toString();
        const dx = ind.el._fromX != null ? ind.el._fromX - player.position.x : 0;
        const dz = ind.el._fromZ != null ? ind.el._fromZ - player.position.z : 0;
        if (ind.life <= 0) {
          hitDirContainer.removeChild(ind.el);
          hitIndicators.splice(i, 1);
        }
      }
    }

    function makeNameSprite(name) {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 48;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, 256, 48);
      ctx.font = "bold 28px Audiowide, Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "rgba(0,0,0,0.7)";
      ctx.shadowBlur = 6;
      ctx.fillText(name.slice(0, 16), 128, 24);
      const tex = new THREE.CanvasTexture(canvas);
      const sprite = new THREE.Sprite(
        new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false })
      );
      sprite.scale.set(2.2, 0.42, 1);
      sprite.raycast = () => {};
      return { sprite, canvas, ctx, tex };
    }

    function updateNameSprite(rp, name) {
      const ctx = rp.nameCtx;
      ctx.clearRect(0, 0, 256, 48);
      ctx.font = "bold 28px Audiowide, Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "rgba(0,0,0,0.7)";
      ctx.shadowBlur = 6;
      ctx.fillText(name.slice(0, 16), 128, 24);
      rp.nameTex.needsUpdate = true;
    }

    function makeThirdPersonGun(type) {
      const g = new THREE.Group();
      const metalColor = [0x3b4450, 0x374151, 0x6b7280, 0x4b5563][type] || 0x555555;
      const lengths = [0.32, 0.6, 0.6, 0.5];
      const widths = [0.06, 0.08, 0.1, 0.07];
      const barrel = new THREE.Mesh(
        new THREE.BoxGeometry(widths[type], 0.06, lengths[type]),
        new THREE.MeshStandardMaterial({ color: metalColor })
      );
      g.add(barrel);
      if (type === 1 || type === 3) {
        const mag = new THREE.Mesh(
          new THREE.BoxGeometry(0.04, 0.14, 0.06),
          new THREE.MeshStandardMaterial({ color: 0x20242c })
        );
        mag.position.set(0, -0.08, 0.05);
        g.add(mag);
      }
      if (type === 2) {
        const pump = new THREE.Mesh(
          new THREE.BoxGeometry(0.08, 0.05, 0.14),
          new THREE.MeshStandardMaterial({ color: 0x7c5a3a })
        );
        pump.position.set(0, -0.04, -0.06);
        g.add(pump);
      }
      g.scale.set(0.9, 0.9, 0.9);
      return g;
    }

    function createRemotePlayer(name) {
      const group = new THREE.Group();
      const matJacket = new THREE.MeshStandardMaterial({ color: 0x2c5282 });
      const matJacketD = new THREE.MeshStandardMaterial({ color: 0x1a3a5c });
      const matSkin = new THREE.MeshStandardMaterial({ color: 0xe8c9a0 });
      const matSkinD = new THREE.MeshStandardMaterial({ color: 0xc8a580 });
      const matPants = new THREE.MeshStandardMaterial({ color: 0x2d3748 });
      const matBoot = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
      const matHelmet = new THREE.MeshStandardMaterial({ color: 0x3a4a5e });
      const matVisor = new THREE.MeshStandardMaterial({ color: 0x4fd1ff, transparent: true, opacity: 0.6 });
      const matVest = new THREE.MeshStandardMaterial({ color: 0x4a5568 });
      const matBelt = new THREE.MeshStandardMaterial({ color: 0x2d2d2d });

      // --- torso ---
      const chest = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.52, 0.32), matJacket);
      chest.position.y = 1.24;
      group.add(chest);
      const belly = new THREE.Mesh(new THREE.BoxGeometry(0.58, 0.26, 0.30), matJacket);
      belly.position.y = 0.88;
      group.add(belly);
      // tactical vest
      const vestFront = new THREE.Mesh(new THREE.BoxGeometry(0.54, 0.40, 0.08), matVest);
      vestFront.position.set(0, 1.18, 0.18);
      group.add(vestFront);
      const vestBack = new THREE.Mesh(new THREE.BoxGeometry(0.54, 0.40, 0.06), matVest);
      vestBack.position.set(0, 1.18, -0.17);
      group.add(vestBack);
      // pouches on vest
      const pouch1 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.10, 0.06), matBelt);

    function addWindowWallX(centerX, centerZ, totalW, wallH = 4.5, thick = 1.0, windowW = 4, windowBottom = 1.4, windowTop = 3.0) {
      const pillarW = (totalW - windowW) / 2;
      addWallBox(pillarW, wallH, thick, centerX - (windowW / 2 + pillarW / 2), wallH / 2, centerZ);
      addWallBox(pillarW, wallH, thick, centerX + (windowW / 2 + pillarW / 2), wallH / 2, centerZ);

      const lowerH = windowBottom;
      if (lowerH > 0) addWallBox(windowW, lowerH, thick, centerX, lowerH / 2, centerZ);

      const upperH = wallH - windowTop;
      if (upperH > 0) addWallBox(windowW, upperH, thick, centerX, windowTop + upperH / 2, centerZ);
    }

    function addWindowWallZ(centerX, centerZ, totalD, wallH = 4.5, thick = 1.0, windowD = 4, windowBottom = 1.4, windowTop = 3.0) {

      addWallBox(thick, wallH, pillarD, centerX, wallH / 2, centerZ - (windowD / 2 + pillarD / 2));
      addWallBox(thick, wallH, pillarD, centerX, wallH / 2, centerZ + (windowD / 2 + pillarD / 2));

      const lowerH = windowBottom;
      if (lowerH > 0) addWallBox(thick, lowerH, windowD, centerX, lowerH / 2, centerZ);

      const upperH = wallH - windowTop;
      if (upperH > 0) addWallBox(thick, upperH, windowD, centerX, windowTop + upperH / 2, centerZ);

    function findSpawnPosition(minDist) {
      const S = CURRENT_MAP === "crossfire" ? 43 : 40;
      const players = getAllPlayerPositions();
      let dist = minDist;
      for (let attempt = 0; attempt < 60; attempt++) {
        if (attempt > 0 && attempt % 15 === 0) {
          dist = Math.max(SPAWN_MIN_DIST_FLOOR, dist * 0.6);
        }
        const x = (Math.random() * 2 - 1) * S;
        const z = (Math.random() * 2 - 1) * S;
        if (enemyCollidesWall(x, z, 0.5)) continue;
        let tooClose = false;
        for (const p of players) {
          const dx = x - p.x, dz = z - p.z;
          if (dx * dx + dz * dz < dist * dist) { tooClose = true; break; }
        }
        if (tooClose) continue;
        return { x, z, usedDist: dist };
      }
      const x = (Math.random() * 2 - 1) * S;
      const z = (Math.random() * 2 - 1) * S;
      return { x, z, usedDist: 0 };
    }

    function collidesWithWalls(pos) {
      const sphere = new THREE.Sphere(new THREE.Vector3(pos.x, 1.0, pos.z), player.radius);

        if (box.intersectsSphere(sphere)) return true;
      }
      return false;
    }

    function resolveWallSliding(nextPos) {
      const result = player.position.clone();

      const tryX = result.clone();
      tryX.x = nextPos.x;
      if (!collidesWithWalls(tryX)) result.x = tryX.x;

      const tryZ = result.clone();
      tryZ.z = nextPos.z;
      if (!collidesWithWalls(tryZ)) result.z = tryZ.z;

      return result;
    }

      ctx.fillRect(4, 8, 120, 8);
      ctx.fillStyle = enemy.type === "tank" ? "#60a5fa" : (enemy.type === "gunner" ? "#f87171" : (enemy.type === "fast" ? "#facc15" : "#22c55e"));
      ctx.fillRect(4, 8, 120 * Math.max(0, enemy.hp) / enemy.maxHp, 8);
      ctx.strokeStyle = "rgba(255,255,255,0.85)";
      ctx.lineWidth = 1;
      ctx.strokeRect(4, 8, 120, 8);
      enemy.hpTexture.needsUpdate = true;

    function playGunSound(w) {
      if (audioCtx.state === "suspended") audioCtx.resume();

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = "square";
      osc.frequency.setValueAtTime(w.soundBase, now);
      osc.frequency.exponentialRampToValueAtTime(w.soundBase * 0.45, now + 0.08);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(2200, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.10, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.12);
    }

        bloodGroup.remove(drop);

        drop.material.dispose();

      for (let i = 0; i < ZOMBIE_COUNT; i++) {
        const { x, z } = findSpawnPosition(SPAWN_MIN_DIST_BASE);
        const type = ZOMBIE_TYPES[i % ZOMBIE_TYPES.length];
        const zombie = makeZombie(x, z, type);
        drawEnemyHp(zombie);
        state.enemies.push(zombie);
      }
    }

    function getWeaponDirection(totalSpread) {
      const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
      const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
      const up = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);

      dir.add(right.multiplyScalar((Math.random() - 0.5) * totalSpread));
      dir.add(up.multiplyScalar((Math.random() - 0.5) * totalSpread));
      dir.normalize();

      return dir;
    }

    function getBodyZone(enemy, point) {
      const local = enemy.group.worldToLocal(point.clone());
      if (local.y > 1.55) return "head";
      if (local.y < 0.95) return "leg";
      return "body";
    }

    function applyDamage(enemy, zone, w) {
      if (zone === "head") enemy.hp -= w.damageHead;
      else if (zone === "leg") enemy.hp -= w.damageLegs;
      else enemy.hp -= w.damageBody;
      drawEnemyHp(enemy);
    }

    function tryShoot() {
      if (player.health <= 0) return;
      const now = performance.now();
      const w = weapon();
      const shootingAds = (state.ads || keys.shift) && !state.reloading && player.health > 0;

      if (state.reloading) return;
      if (w.ammo <= 0) {
        startReload();
        return;
      }
      if (now - state.lastShot < w.fireDelay) return;

      state.lastShot = now;
      w.ammo -= 1;

      let spreadMultiplier = 1;
      let recoilMultiplier = 1;
         
      if (state.weaponIndex === 0) {
        spreadMultiplier = shootingAds ? 0.25 : 2.0;
        recoilMultiplier = shootingAds ? 0.75 : 1.0;

      } else if (state.weaponIndex === 1) {
        spreadMultiplier = shootingAds ? 0.25 : 1.6;
        recoilMultiplier = shootingAds ? 0.70 : 1.0;
        
      } else if (state.weaponIndex === 2) {
        spreadMultiplier = shootingAds ? 0.77 : 1.6;
        recoilMultiplier = shootingAds ? 0.90 : 1.0;
          
      } else if (state.weaponIndex === 3) {
        spreadMultiplier = shootingAds ? 0.5 : 0.8;
        recoilMultiplier = 0.90;
      }
      state.recoil += w.recoil * recoilMultiplier;
      state.spreadBloom = Math.min(
        w.spreadBloomMax,
        state.spreadBloom + w.spreadBloomAdd
      );

      const muzzleStart = new THREE.Vector3();
      weaponModels[state.weaponIndex].userData.gun.getWorldPosition(muzzleStart);

      playGunSound(w);

      for (let i = 0; i < w.pellets; i++) {
        const movingPenalty = (keys.w || keys.a || keys.s || keys.d) ? 1.25 : 1;
        const adsPenalty = shootingAds ? 1 : 1.8;
        const totalSpread = (w.spreadBase + state.spreadBloom) * spreadMultiplier * movingPenalty * adsPenalty;
        const dir = getWeaponDirection(totalSpread);
        const ray = new THREE.Raycaster(camera.position, dir, 0, 160);
        ray.camera = camera;

        let bestEnemy = null;
        let bestEnemyHit = null;

        for (const enemy of state.enemies) {
          if (!enemy.alive) continue;
          const hits = ray.intersectObject(enemy.group, true);
          if (hits.length > 0) {
            if (!bestEnemyHit || hits[0].distance < bestEnemyHit.distance) {
              bestEnemy = enemy;
              bestEnemyHit = hits[0];
            }
          }
        }

        let bestRpId = null;
        let bestRpHit = null;
        if (MULTIPLAYER) {
          for (const [rpId, rp] of remotePlayers) {
            if (!rp.group.visible) continue;
            const hits = ray.intersectObject(rp.group, true);
            if (hits.length > 0) {
              if (!bestRpHit || hits[0].distance < bestRpHit.distance) {
                bestRpId = rpId;
                bestRpHit = hits[0];
              }
            }
          }
        }

        const wallHits = ray.intersectObjects(wallMeshes, false);
        const wallHit = wallHits.length > 0 ? wallHits[0] : null;

        const enemyDist = bestEnemyHit ? bestEnemyHit.distance : Infinity;
        const rpDist = bestRpHit ? bestRpHit.distance : Infinity;
        const wallDist = wallHit ? wallHit.distance : Infinity;
        const closestDist = Math.min(enemyDist, rpDist, wallDist);

        if (closestDist === enemyDist && bestEnemy && bestEnemyHit) {
          const zone = getBodyZone(bestEnemy, bestEnemyHit.point);
          applyDamage(bestEnemy, zone, w);
          const bp = bestEnemyHit.point.clone();
          createBlood(bp);
          createTracer(muzzleStart, bp.clone(), w.color);
          state.hitmarkerTimer = 0.08;
          hitmarkerEl.classList.add("show");
          if (MULTIPLAYER) {
            socket.emit("shoot", { x: bp.x, y: bp.y, z: bp.z, nx: 0, ny: 0, nz: 0, color: w.color, type: "blood" });
          }

          if (bestEnemy.hp <= 0 && bestEnemy.alive) {
            bestEnemy.alive = false;
            bestEnemy.respawnTimer = 3.0;
            bestEnemy.group.visible = false;
            state.score += 1;
          }
        } else if (closestDist === rpDist && bestRpId && bestRpHit) {
          const bp = bestRpHit.point.clone();
          createBlood(bp);
          createTracer(muzzleStart, bp.clone(), w.color);
          state.hitmarkerTimer = 0.08;
          hitmarkerEl.classList.add("show");
          const dmg = w.damageBody;
          socket.emit("hit", { target: bestRpId, damage: dmg, x: player.position.x, z: player.position.z });
          socket.emit("shoot", { x: bp.x, y: bp.y, z: bp.z, nx: 0, ny: 0, nz: 0, color: w.color, type: "blood" });
        } else if (wallHit) {
          createTracer(muzzleStart, wallHit.point.clone(), w.color);
          createSparks(wallHit.point.clone(), w.color);
          const normal = wallHit.face.normal.clone().transformDirection(wallHit.object.matrixWorld);
          createBulletMark(wallHit.point.clone(), normal);
          if (MULTIPLAYER) {
            socket.emit("shoot", { x: wallHit.point.x, y: wallHit.point.y, z: wallHit.point.z, nx: normal.x, ny: normal.y, nz: normal.z, color: w.color, type: "spark" });
          }
        } else {
          createTracer(muzzleStart, muzzleStart.clone().add(dir.multiplyScalar(12)), w.color);
        }
      }

      updateHud();
    }

    function updateWeaponVisuals(dt, isMoving) {
      const t = performance.now() * 0.001;

      const usingAds = (state.ads || keys.shift) && !state.reloading && player.health > 0 && state.weaponIndex !== 3;
        
      let bobX = 0;
      let bobY = 0;
      let bobRotZ = 0;

      if (isMoving && player.onGround && !usingAds) {
        bobX = Math.sin(t * 5.5) * 0.005;
        bobY = Math.abs(Math.cos(t * 11)) * 0.007;
        bobRotZ = Math.sin(t * 5.5) * 0.008;
      }

      let reloadX = 0;
      let reloadY = 0;
      let reloadRotZ = 0;
      let reloadRotY = 0;

      if (state.reloading) {
        const total = weapon().reloadTime;
        const remaining = state.reloadEnd - performance.now();
        const progress = THREE.MathUtils.clamp(1 - remaining / total, 0, 1);

        if (progress < 0.25) {
          const p = progress / 0.25;
          reloadRotZ = -1.0 * p;
          reloadRotY = -0.35 * p;
          reloadY = 0.08 * p;
        } else if (progress < 0.8) {
          const p = (progress - 0.25) / 0.55;
          reloadRotZ = -1.0;
          reloadRotY = -0.35;
          reloadY = 0.08 + Math.sin(p * Math.PI * 3) * 0.05;
          reloadX = -0.03;
        } else {
          const p = (progress - 0.8) / 0.2;
          reloadRotZ = -1.0 * (1 - p);
          reloadRotY = -0.35 * (1 - p);
          reloadY = 0.08 * (1 - p);
        }
      }

      const activeWeapon = weaponModels[state.weaponIndex];
      const gun = activeWeapon.userData.gun;
      const basePos = activeWeapon.userData.basePos;
      const adsOffset = activeWeapon.userData.adsOffset;

      const targetAds = usingAds ? 1 : 0;
      const adsSpeed = weapon().adsSpeed ?? 8;

      state.adsProgress += (targetAds - state.adsProgress) * Math.min(1, dt * adsSpeed);

      const adsBlend = state.adsProgress;

      const targetScale = (usingAds && state.weaponIndex === 1) ? 1.18 : 1.0;
      const scaleVec = new THREE.Vector3(targetScale, targetScale, targetScale);
      activeWeapon.scale.lerp(scaleVec, Math.min(1, dt * 12));
      const targetX = basePos.x + adsOffset.x * adsBlend;
      const targetY = basePos.y + adsOffset.y * adsBlend;
      const targetZ = basePos.z + adsOffset.z * adsBlend;

      gun.position.x += (targetX - gun.position.x) * Math.min(1, dt * 16);
      gun.position.y += (targetY - gun.position.y) * Math.min(1, dt * 16);
      gun.position.z += (targetZ - gun.position.z) * Math.min(1, dt * 16);
         
      const hideCrosshair = usingAds && state.weaponIndex !== 1;
      crosshairEl.classList.toggle("hidden", hideCrosshair);

      weaponRoot.position.set(bobX + reloadX, -state.recoil - bobY + reloadY, 0);
      weaponRoot.rotation.set(
        state.recoil * (usingAds ? 0.7 : 1.0),
        reloadRotY,
        bobRotZ + reloadRotZ
      );

      const targetFov = usingAds ? 38 : 75;
      if (camera.fov !== targetFov) {
        camera.fov += (targetFov - camera.fov) * Math.min(1, dt * 10);
        camera.updateProjectionMatrix();
      }
    }

    function updateWeapon(dt) {
      const w = weapon();

      if (state.reloading && performance.now() >= state.reloadEnd) {
        state.reloading = false;
        w.ammo = w.magSize;
        updateHud();
      }

      state.spreadBloom = Math.max(0, state.spreadBloom - w.recover * dt);
      state.recoil *= Math.pow(0.13, dt);
      if (state.recoil < 0.0002) state.recoil = 0;

      const movingNow = keys.w || keys.a || keys.s || keys.d;
      updateWeaponVisuals(dt, movingNow);
    }

    function updatePlayer(dt) {
      if (player.health <= 0) {
        camera.position.copy(player.position);
        camera.rotation.y = player.yaw;
        camera.rotation.x = player.pitch;
        return;
      }
      
      const forward = new THREE.Vector3(0, 0, -1)
        .applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);
      const right = new THREE.Vector3(1, 0, 0)
        .applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);

      const move = new THREE.Vector3();
      if (keys.w) move.add(forward);
      if (keys.s) move.sub(forward);
      if (keys.d) move.add(right);
      if (keys.a) move.sub(right);

      if (move.lengthSq() > 0) {
        move.normalize().multiplyScalar(player.speed * dt);
        const next = player.position.clone().add(new THREE.Vector3(move.x, 0, move.z));
        const resolved = resolveWallSliding(next);
        player.position.x = resolved.x;
        player.position.z = resolved.z;  
      }

      if (keys.space && player.onGround) {
        player.velocityY = 5.8;
        player.onGround = false;
      }

      player.velocityY -= 14 * dt;
      player.position.y += player.velocityY * dt;

      if (player.position.y <= 1.65) {
        player.position.y = 1.65;
        player.velocityY = 0;
        player.onGround = true;
      }

      const movingNow = keys.w || keys.a || keys.s || keys.d;
      const headBob = (movingNow && player.onGround)
        ? Math.abs(Math.sin(performance.now() * 0.012)) * 0.02
        : 0;

      camera.position.copy(player.position);
      camera.position.y += headBob;
      camera.rotation.y = player.yaw;
      camera.rotation.x = player.pitch;
      if (MULTIPLAYER) {
        socket.emit("move", {
          x: player.position.x,
          y: player.position.y,
          z: player.position.z,
          yaw: player.yaw,
          name: playerName,
          weapon: state.weaponIndex
        });
      }
    }
    function showDeathScreen(killer) {
      killerEnemy = killer || null;
      deathAnimTime = 0;
      crosshairEl.classList.add("hidden");
      state.mouseDown = false;
      state.ads = false;
      weaponRoot.visible = false;

      if (document.pointerLockElement) {
        document.exitPointerLock();
      }

      if (CURRENT_MAP !== "crossfire" && killerEnemy) {
        const ex = killerEnemy.group.position.x;
        const ez = killerEnemy.group.position.z;
        deathCamYaw = Math.atan2(ex - player.position.x, ez - player.position.z);
        deathCamPitch = -0.1;
        deathBaseFov = camera.fov;
      }

      deathOverlay.style.display = "block";
      deathFade.style.background = "rgba(0,0,0,0)";
      deathUI.style.display = "none";

      if (CURRENT_MAP === "crossfire") {
        deathUI.style.display = "flex";
        deathUI.style.opacity = "0.25";
        deathTitle.textContent = "DEFEATED";
        deathTitle.style.color = "#e53e3e";
        deathScore.textContent = "";
        btnDeathRestart.style.display = "none";
        deathOverlay.style.pointerEvents = "auto";
        deathUI.addEventListener("mouseenter", () => { deathUI.style.opacity = "1"; });
        deathUI.addEventListener("mouseleave", () => { deathUI.style.opacity = "0.25"; });
      } else {
        deathScore.textContent = `Score: ${state.score}`;
        deathTitle.textContent = "DEFEAT";
        deathTitle.style.color = "#e53e3e";
        btnDeathRestart.style.display = "";
        deathOverlay.style.pointerEvents = "none";
      }
    }

    function updateDeathAnim(dt) {
      if (player.health > 0 || CURRENT_MAP === "crossfire") return;
      deathAnimTime += dt;
      const t = Math.min(deathAnimTime / DEATH_ANIM_DURATION, 1);
      const fadeOpacity = t * 0.5;
      deathFade.style.background = `rgba(0,0,0,${fadeOpacity})`;

      if (killerEnemy) {
        player.yaw += (deathCamYaw - player.yaw) * Math.min(1, dt * 4);
        player.pitch += (deathCamPitch - player.pitch) * Math.min(1, dt * 4);
      }
      const zoomFov = deathBaseFov - t * 20;
      camera.fov = Math.max(30, zoomFov);
      camera.updateProjectionMatrix();

      camera.position.copy(player.position);
      camera.rotation.y = player.yaw;
      camera.rotation.x = player.pitch;

      if (t >= 1 && deathUI.style.display === "none") {
        deathUI.style.display = "flex";
        deathOverlay.style.pointerEvents = "auto";
      }
    }

    function hideDeathScreen() {
      deathOverlay.style.display = "none";
      deathUI.style.display = "none";
      deathFade.style.background = "rgba(0,0,0,0)";
      deathOverlay.style.pointerEvents = "none";
      killerEnemy = null;
      weaponRoot.visible = true;
      camera.fov = 75;
      camera.updateProjectionMatrix();
    }

    function damagePlayer(amount, attacker) {
      if (player.health <= 0) return;
      player.health = Math.max(0, player.health - amount);
      player.regenTimer = 0;
      state.flashTimer = 0.14;
      if (attacker && attacker.group) {
        addHitIndicator(attacker.group.position.x, attacker.group.position.z);
      }
      updateHud();
      if (player.health <= 0) {
        showDeathScreen(attacker);
      }
    }

    function showPause() {
      if (player.health <= 0) return;
      if (paused) return;
      paused = true;
      pauseOverlay.style.display = "flex";
      btnPauseRestart.style.display = (CURRENT_MAP !== "crossfire") ? "" : "none";
      crosshairEl.classList.add("hidden");
    }

    function hidePause() {
      paused = false;
      pauseOverlay.style.display = "none";
      crosshairEl.classList.remove("hidden");
    }

    // ── Nav grid + BFS flow field (shared by all zombies) ──
    const NAV_CELL = 2.0;
    const NAV_RADIUS = 0.5;
    let navGrid = null;
    let navMinX = 0, navMinZ = 0, navCols = 0, navRows = 0;
    let flowDirX = null, flowDirZ = null;
    let flowPlayerC = -1, flowPlayerR = -1;

    function buildNavGrid() {
      const S = CURRENT_MAP === "crossfire" ? 45 : 42;
      navMinX = -S;
      navMinZ = -S;
      navCols = Math.ceil((S * 2) / NAV_CELL);
      navRows = Math.ceil((S * 2) / NAV_CELL);
      navGrid = new Uint8Array(navCols * navRows);
      for (let r = 0; r < navRows; r++) {
        for (let c = 0; c < navCols; c++) {
          const wx = navMinX + (c + 0.5) * NAV_CELL;
          const wz = navMinZ + (r + 0.5) * NAV_CELL;
          navGrid[r * navCols + c] = enemyCollidesWall(wx, wz, NAV_RADIUS) ? 1 : 0;
        }
      }
      const total = navCols * navRows;
      flowDirX = new Float32Array(total);
      flowDirZ = new Float32Array(total);
      flowPlayerC = -1;
      flowPlayerR = -1;
    }

    function worldToGrid(x, z) {
      const c = ((x - navMinX) / NAV_CELL) | 0;
      const r = ((z - navMinZ) / NAV_CELL) | 0;
      return [c, r];
    }

    function rebuildFlowField() {
      if (!navGrid) return;
      const pc = Math.min(navCols - 1, Math.max(0, ((player.position.x - navMinX) / NAV_CELL) | 0));
      const pr = Math.min(navRows - 1, Math.max(0, ((player.position.z - navMinZ) / NAV_CELL) | 0));
      if (pc === flowPlayerC && pr === flowPlayerR) return;
      flowPlayerC = pc;
      flowPlayerR = pr;

      const total = navCols * navRows;
      const dist = new Uint16Array(total).fill(65535);
      const goalIdx = pr * navCols + pc;
      dist[goalIdx] = 0;

      const queue = [goalIdx];
      let head = 0;
      while (head < queue.length) {
        const idx = queue[head++];
        const cr = (idx / navCols) | 0;
        const cc = idx % navCols;
        const nd = dist[idx] + 1;
        for (let dr = -1; dr <= 1; dr++) {
          const nr = cr + dr;
          if (nr < 0 || nr >= navRows) continue;
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nc = cc + dc;
            if (nc < 0 || nc >= navCols) continue;
            const nIdx = nr * navCols + nc;
            if (navGrid[nIdx]) continue;
            if (dr !== 0 && dc !== 0) {
              if (navGrid[cr * navCols + nc] || navGrid[nr * navCols + cc]) continue;
            }
            if (nd < dist[nIdx]) {
              dist[nIdx] = nd;
              queue.push(nIdx);
            }
          }
        }
      }

      for (let r = 0; r < navRows; r++) {
        for (let c = 0; c < navCols; c++) {
          const idx = r * navCols + c;
          if (navGrid[idx]) continue;
          let bestD = dist[idx];
          let bx = 0, bz = 0;
          for (let dr = -1; dr <= 1; dr++) {
            const nr = r + dr;
            if (nr < 0 || nr >= navRows) continue;
            for (let dc = -1; dc <= 1; dc++) {
              if (dr === 0 && dc === 0) continue;
              const nc = c + dc;
              if (nc < 0 || nc >= navCols) continue;
              const nIdx = nr * navCols + nc;
              if (navGrid[nIdx]) continue;
              if (dr !== 0 && dc !== 0) {
                if (navGrid[r * navCols + nc] || navGrid[nr * navCols + c]) continue;
              }
              if (dist[nIdx] < bestD) {
                bestD = dist[nIdx];
                bx = dc;
                bz = dr;
              }
            }
          }
          if (bx !== 0 || bz !== 0) {
            const len = Math.sqrt(bx * bx + bz * bz);
            flowDirX[idx] = bx / len;
            flowDirZ[idx] = bz / len;
          } else {
            flowDirX[idx] = 0;
            flowDirZ[idx] = 0;
          }
        }
      }
    }

    function getFlowDirection(ex, ez) {
      if (!flowDirX) return null;
      const c = Math.min(navCols - 1, Math.max(0, ((ex - navMinX) / NAV_CELL) | 0));
      const r = Math.min(navRows - 1, Math.max(0, ((ez - navMinZ) / NAV_CELL) | 0));
      const idx = r * navCols + c;
      const fx = flowDirX[idx];
      const fz = flowDirZ[idx];
      if (fx === 0 && fz === 0) return null;
      return { x: fx, z: fz };
    }

    // ── Zombie vision / awareness (throttled, 360° FOV) ──
    const LOSE_RATIO = 0.10;
    const LOSE_TIME = 15.0;
    const RETARGET_INTERVAL = 2.0;
    const VIS_OFFSETS = [[0, 1.8], [0, 1.1], [0, 0.5], [-0.3, 1.3], [0.3, 1.3]];
    const _visOrigin = new THREE.Vector3();
    const _visDir = new THREE.Vector3();
    const _visRay = new THREE.Raycaster();
    let visFrameCounter = 0;

    function canSeePoint(ex, ey, ez, px, py, pz) {
      _visOrigin.set(ex, ey, ez);
      _visDir.set(px - ex, py - ey, pz - ez);
      const d = _visDir.length();
      if (d < 0.1) return true;
      _visDir.multiplyScalar(1 / d);
      _visRay.set(_visOrigin, _visDir);
      _visRay.near = 0;
      _visRay.far = d;
      return _visRay.intersectObjects(wallMeshes, false).length === 0;
    }

    function computeVisibility(ex, ez, px, pz) {
      const ey = 1.6;
      let visible = 0;
      for (let i = 0; i < VIS_OFFSETS.length; i++) {
        const oy = VIS_OFFSETS[i][1];
        if (canSeePoint(ex, ey, ez, px, oy, pz)) visible++;
      }
      return visible / VIS_OFFSETS.length;
    }

    function getEnemyTarget(enemy) {
      if (enemy.targetId) {
        const rp = remotePlayers.get(enemy.targetId);
        if (rp && rp.group.visible) return { x: rp.x, y: 1.65, z: rp.z };
        enemy.targetId = null;
      }
      return { x: player.position.x, y: player.position.y, z: player.position.z };
    }

    function retargetEnemy(enemy) {
      if (!MULTIPLAYER) return;
      const ex = enemy.group.position.x;
      const ez = enemy.group.position.z;
      const currentVis = computeVisibility(ex, ez,
        enemy.targetId ? (remotePlayers.get(enemy.targetId)?.x ?? player.position.x) : player.position.x,
        enemy.targetId ? (remotePlayers.get(enemy.targetId)?.z ?? player.position.z) : player.position.z
      );

      if (currentVis >= LOSE_RATIO) return;

      let bestId = null;
      let bestAngleDiff = Infinity;
      const moveYaw = enemy.moveYaw;

      const candidates = [];
      candidates.push({ id: null, x: player.position.x, z: player.position.z });
      for (const [rpId, rp] of remotePlayers) {
        if (rp.group.visible) candidates.push({ id: rpId, x: rp.x, z: rp.z });
      }

      for (const c of candidates) {
        const vis = computeVisibility(ex, ez, c.x, c.z);
        if (vis <= 0) continue;
        const angle = Math.atan2(c.x - ex, c.z - ez);
        let diff = angle - moveYaw;
        if (diff > Math.PI) diff -= Math.PI * 2;
        else if (diff < -Math.PI) diff += Math.PI * 2;
        const absDiff = Math.abs(diff);
        if (absDiff < bestAngleDiff) {
          bestAngleDiff = absDiff;
          bestId = c.id;
        }
      }

      if (bestAngleDiff < Infinity) {
        enemy.targetId = bestId;
      }
    }

    function updateAwareness(enemy, dt) {
      const target = getEnemyTarget(enemy);
      const ex = enemy.group.position.x;
      const ez = enemy.group.position.z;
      const ratio = computeVisibility(ex, ez, target.x, target.z);

      if (!enemy.aware) {
        if (ratio > 0) {
          enemy.aware = true;
          enemy.hiddenTimer = 0;
        }
      } else {
        if (ratio < LOSE_RATIO) {
          enemy.hiddenTimer += dt;
          if (enemy.hiddenTimer >= LOSE_TIME) {
            enemy.aware = false;
            enemy.hiddenTimer = 0;
            enemy.targetId = null;
          }
        } else {
          enemy.hiddenTimer = 0;
        }
      }
    }

    function updateEnemies(dt) {
      if (player.health > 0 && player.health < player.maxHealth) {
        player.regenTimer += dt;
        if (player.regenTimer >= 5.0) {
          player.regenTimer = 0;
          player.health = Math.min(player.maxHealth, player.health + 1);
          updateHud();
        }
      }

      rebuildFlowField();
      visFrameCounter++;

      for (let ei = 0; ei < state.enemies.length; ei++) {
        const enemy = state.enemies[ei];
        if (!enemy.alive) {
          enemy.respawnTimer -= dt;
          if (enemy.respawnTimer <= 0) {
            enemy.alive = true;
            enemy.hp = enemy.maxHp;
            enemy.group.visible = true;
            const sp = findSpawnPosition(SPAWN_MIN_DIST_BASE);
            enemy.group.position.set(sp.x, 0, sp.z);
            enemy.aware = false;
            enemy.hiddenTimer = 0;
            enemy.targetId = null;
            enemy.retargetTimer = 0;
            enemy.facingYaw = Math.random() * Math.PI * 2;
            drawEnemyHp(enemy);
          }
          continue;
        }

        const target = getEnemyTarget(enemy);
        const dx = target.x - enemy.group.position.x;
        const dz = target.z - enemy.group.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if ((visFrameCounter + ei) % 6 === 0) {
          updateAwareness(enemy, dt * 6);
        }

        enemy.retargetTimer += dt;
        if (enemy.aware && enemy.retargetTimer >= RETARGET_INTERVAL) {
          enemy.retargetTimer = 0;
          retargetEnemy(enemy);
        }

        enemy.attackCooldownTimer -= dt;

        if (enemy.aware) {
          enemy.facingYaw = Math.atan2(dx, dz);
          enemy.group.rotation.y = enemy.facingYaw;

          const shouldStopForRanged = enemy.ranged && dist < enemy.rangeDistance && dist > 4.8;

          if (!shouldStopForRanged && dist > 1.8) {
            const step = enemy.speed * dt;
            const dLen = Math.sqrt(dx * dx + dz * dz);
            let sx = (dx / dLen) * step;
            let sz = (dz / dLen) * step;
            let nx = enemy.group.position.x + sx;
            let nz = enemy.group.position.z + sz;

            if (!enemyCollidesWall(nx, nz)) {
              enemy.group.position.x = nx;
              enemy.group.position.z = nz;
            } else if (!enemyCollidesWall(nx, enemy.group.position.z)) {
              enemy.group.position.x = nx;
            } else if (!enemyCollidesWall(enemy.group.position.x, nz)) {
              enemy.group.position.z = nz;
            } else {
              const flow = getFlowDirection(enemy.group.position.x, enemy.group.position.z);
              if (flow) {
                const fLen = Math.sqrt(flow.x * flow.x + flow.z * flow.z);
                if (fLen > 0.01) {
                  sx = (flow.x / fLen) * step;
                  sz = (flow.z / fLen) * step;
                  nx = enemy.group.position.x + sx;
                  nz = enemy.group.position.z + sz;
                  if (!enemyCollidesWall(nx, nz)) {
                    enemy.group.position.x = nx;
                    enemy.group.position.z = nz;
                  } else if (!enemyCollidesWall(nx, enemy.group.position.z)) {
                    enemy.group.position.x = nx;
                  } else if (!enemyCollidesWall(enemy.group.position.x, nz)) {
                    enemy.group.position.z = nz;
                  }
                }
              }
            }
            enemy.moveYaw = Math.atan2(dx, dz);
            enemy.walkTime += dt * (enemy.type === "fast" ? 12 : 8);
            enemy.moving = true;
          } else {
            enemy.moving = false;
          }

          const isTargetLocal = enemy.targetId === null;
          if (!enemy.ranged) {
            if (dist < 2.05 && enemy.attackCooldownTimer <= 0 && isTargetLocal) {
              enemy.attackCooldownTimer = enemy.attackCooldown;
              damagePlayer(enemy.attackDamage, enemy);
            }
          } else if (dist < enemy.rangeDistance && enemy.attackCooldownTimer <= 0 && isTargetLocal) {
            _visOrigin.set(enemy.group.position.x, 1.6, enemy.group.position.z);
            _visDir.set(dx, player.position.y - 0.3 - 1.6, dz).normalize();
            _visRay.set(_visOrigin, _visDir);
            _visRay.near = 0;
            _visRay.far = dist;
            if (_visRay.intersectObjects(wallMeshes, false).length === 0) {
              enemy.attackCooldownTimer = enemy.attackCooldown;
              damagePlayer(enemy.attackDamage, enemy);
              const end = player.position.clone().add(new THREE.Vector3(0, 1.3, 0));
              createTracer(_visOrigin.clone(), end, 0xff6666);
            }
          }
        } else {
          enemy.moving = false;
          enemy.facingYaw += dt * 0.3;
          enemy.group.rotation.y = enemy.facingYaw;
        }

        const walk = Math.sin(enemy.walkTime) * 0.55;
        const bob = Math.abs(Math.sin(enemy.walkTime * 2)) * 0.05;

        if (enemy.aware && dist < 2.2 && !enemy.ranged) {
          enemy.attackPhase += dt * 10;
        } else if (enemy.aware && enemy.ranged && dist < enemy.rangeDistance) {
          enemy.attackPhase += dt * 6;
        } else {
          enemy.attackPhase = 0;
        }

        const attackSwing = enemy.attackPhase > 0 ? Math.max(0, Math.sin(enemy.attackPhase)) * 0.6 : 0;
        enemy.leftArmRoot.rotation.x = (enemy.aware ? -1.0 : -0.2) + attackSwing + (enemy.moving ? walk * 0.15 : 0);
        enemy.rightArmRoot.rotation.x = (enemy.aware ? -1.0 : -0.2) + attackSwing - (enemy.moving ? walk * 0.15 : 0);
        enemy.leftLegRoot.rotation.x = enemy.moving ? -walk : 0;
        enemy.rightLegRoot.rotation.x = enemy.moving ? walk : 0;
        enemy.torsoRoot.position.y = bob;
      }
    }

    function updateTracers(dt) {
      for (let i = state.tracers.length - 1; i >= 0; i--) {
        const t = state.tracers[i];
        t.life -= dt;
        t.material.opacity = Math.max(0, t.life / t.maxLife);
        if (t.life <= 0) {
          tracerGroup.remove(t.line);
          t.line.geometry.dispose();
          t.material.dispose();
          state.tracers.splice(i, 1);
        }
      }
    }

    let _lastChatRefresh = 0;
    function updateEffects(dt) {
      updateBlood(dt);
      updateSparks(dt);
      updateTracers(dt);
      updateHitIndicators(dt);
      const now = performance.now();
      if (!chatOpen && now - _lastChatRefresh > 1000) {
        _lastChatRefresh = now;
        refreshChatVisibility();
      }

      if (state.flashTimer > 0) {
        state.flashTimer -= dt;
        flash.style.background = "rgba(255,0,0,0.20)";
      } else {
        flash.style.background = "rgba(255,0,0,0)";
      }

      if (state.hitmarkerTimer > 0) {
        state.hitmarkerTimer -= dt;
      } else {
        hitmarkerEl.classList.remove("show");
      }
    }

    function animate() {
      const dt = Math.min(clock.getDelta(), 0.033);

      if (MULTIPLAYER) {
        for (const rp of remotePlayers.values()) {
          rp.group.position.set(rp.x, 0, rp.z);
          rp.group.rotation.y = rp.yaw + Math.PI;
        }
      }

      if (paused) {
        if (MULTIPLAYER) {
          updatePlayer(dt);
        }
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
        return;
      }

      updatePlayer(dt);
      updateWeapon(dt);

      if (CURRENT_MAP === "arena") {
        if (player.health > 0) {
          updateEnemies(dt);
        }
        updateDeathAnim(dt);
      }

      if (CURRENT_MAP === "crossfire" && MULTIPLAYER && player.health <= 0) {
        const first = remotePlayers.values().next().value;
        if (first) {
          camera.position.set(first.x, first.y, first.z);
          camera.rotation.y = first.yaw;
          camera.rotation.x = 0;
        }
      }

      updateEffects(dt);
      updateHud();

      if (player.health > 0 && state.mouseDown && weapon().auto) {
        tryShoot();
      }

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    const clock = new THREE.Clock();

    function startGame(mapName, multiplayer) {
      hideDeathScreen();
      hidePause();
      closeChat();
      chatMessages.innerHTML = "";
      chatLog.length = 0;
      hitDirContainer.innerHTML = "";
      hitIndicators.length = 0;
      CURRENT_MAP = mapName;
      if (multiplayer !== undefined) MULTIPLAYER = multiplayer;
      menuEl.style.display = "none";

      clearMap();
      MAP_BUILDERS[CURRENT_MAP]();
      buildNavGrid();

      for (const enemy of state.enemies) {
        scene.remove(enemy.group);
      }
      state.enemies.length = 0;

      if (MULTIPLAYER && activeRoomId) {
        socket.emit("joinRoom", activeRoomId);
      }
      if (CURRENT_MAP === "arena") {
        rebuildEnemyRoster();
      }

      if (CURRENT_MAP === "crossfire") {
        player.position.set(0, 1.65, 34);
      } else {
        player.position.set(-30, 1.65, -30);
      }

      player.velocityY = 0;
      player.onGround = true;
      player.yaw = 0;
      player.pitch = 0;
      camera.position.copy(player.position);

      state.score = 0;
      player.health = player.maxHealth;
      player.regenTimer = 0;
      state.ads = false;
      state.adsProgress = 0;
      state.mouseDown = false;
      state.reloading = false;
      state.recoil = 0;
      state.spreadBloom = 0;
      killerEnemy = null;
      deathAnimTime = 0;
      weaponRoot.visible = true;

      for (const w of weapons) {
        w.ammo = w.magSize;
      }
    
      setWeapon(1);
      updateHud();

      if (!started) {
        started = true;
        animate();
      }
    }

    function goToMenu() {
      hideDeathScreen();
      hidePause();
      MULTIPLAYER = false;
      ROOM_CODE = "";
      activeRoomId = "";
      menuEl.style.display = "flex";
      showMenuPanel("menuMain");
      player.health = 100;
      weaponRoot.visible = true;
      camera.fov = 75;
      camera.updateProjectionMatrix();
      for (const enemy of state.enemies) {
        scene.remove(enemy.group);
      }
      state.enemies.length = 0;
      for (const [id, rp] of remotePlayers) {
        scene.remove(rp.group);
      }
      remotePlayers.clear();
    }

    function showMenuPanel(id) {
      for (const p of [menuMain, menuArenaMode, menuLobby, menuJoinCode]) p.style.display = "none";
      document.getElementById(id).style.display = "flex";
    }

    function showLobby(mode, title) {
      pendingLobbyMode = mode;
      lobbyTitle.textContent = title;
      showMenuPanel("menuLobby");
    }

    function beginMultiplayerGame(mapName, code) {
      activeRoomId = code || "";
      ROOM_CODE = code || "";
      nameModal.style.display = "flex";
      nameInput.value = "";
      nameInput.focus();
      nameModal._pendingMap = mapName;
    }

    btnArena.addEventListener("click", () => showMenuPanel("menuArenaMode"));
    btnArenaSingle.addEventListener("click", () => startGame("arena", false));
    btnArenaCoop.addEventListener("click", () => showLobby("arena-coop", "ARENA CO-OP"));
    btnArenaBack.addEventListener("click", () => showMenuPanel("menuMain"));

    btnCrossfire.addEventListener("click", () => showLobby("crossfire", "CROSSFIRE"));

    btnQuickplay.addEventListener("click", () => {
      socket.emit("quickplay", pendingLobbyMode, (res) => {
        if (res.error) { codeError.textContent = res.error; return; }
        const map = pendingLobbyMode === "crossfire" ? "crossfire" : "arena";
        beginMultiplayerGame(map, res.room);
      });
    });

    btnCreateRoom.addEventListener("click", () => {
      socket.emit("createRoom", pendingLobbyMode, (res) => {
        if (res.error) { codeError.textContent = res.error; return; }
        const map = pendingLobbyMode === "crossfire" ? "crossfire" : "arena";
        beginMultiplayerGame(map, res.code);
      });
    });

    btnJoinCode.addEventListener("click", () => {
      codeError.textContent = "";
      codeInput.value = "";
      showMenuPanel("menuJoinCode");
    });

    btnCodeJoin.addEventListener("click", () => {
      const code = codeInput.value.trim().toUpperCase();
      if (!code) { codeError.textContent = "Enter a code"; return; }
      socket.emit("joinByCode", { code, mode: pendingLobbyMode }, (res) => {
        if (res.error) { codeError.textContent = res.error; return; }
        const map = pendingLobbyMode === "crossfire" ? "crossfire" : "arena";
        beginMultiplayerGame(map, code);
      });
    });

    codeInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") btnCodeJoin.click();
    });

    btnCodeBack.addEventListener("click", () => showMenuPanel("menuLobby"));
    btnLobbyBack.addEventListener("click", () => {
      if (pendingLobbyMode === "crossfire") showMenuPanel("menuMain");
      else showMenuPanel("menuArenaMode");
    });

    btnNameOk.addEventListener("click", () => {
      playerName = nameInput.value.trim().slice(0, 16) || "Player";
      nameModal.style.display = "none";
      const map = nameModal._pendingMap || "crossfire";
      startGame(map, true);
    });

    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") btnNameOk.click();
    });

    btnDeathRestart.addEventListener("click", () => startGame(CURRENT_MAP));
    btnDeathQuit.addEventListener("click", goToMenu);
    btnResume.addEventListener("click", () => {
      hidePause();
      renderer.domElement.requestPointerLock();
    });
    btnPauseRestart.addEventListener("click", () => startGame(CURRENT_MAP));
    btnPauseQuit.addEventListener("click", goToMenu);
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
