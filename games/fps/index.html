<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Zombie FPS Prototype</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      cursor: none;
    }

    .hud {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.5;
      user-select: none;
      pointer-events: none;
      min-width: 340px;
      font-size: 14px;
      backdrop-filter: blur(4px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.28);
    }

    .hint {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      background: rgba(0, 0, 0, 0.75);
      padding: 14px 18px;
      border-radius: 12px;
      pointer-events: none;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    .flash {
      position: fixed;
      inset: 0;
      background: rgba(255, 0, 0, 0);
      pointer-events: none;
      z-index: 10;
    }

    .crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 25;
      opacity: 1;
      transition: opacity 0.12s ease;
    }

    .crosshair.hidden {
      opacity: 0;
    }

    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 0 6px rgba(255,255,255,0.5);
    }

    .crosshair::before {
      left: 8px;
      top: 0;
      width: 2px;
      height: 18px;
    }

    .crosshair::after {
      left: 0;
      top: 8px;
      width: 18px;
      height: 2px;
    }

    .hitmarker {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 26px;
      height: 26px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 28;
      opacity: 0;
      transition: opacity 0.08s linear;
    }

    .hitmarker.show {
      opacity: 1;
    }

    .hitmarker::before,
    .hitmarker::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 22px;
      background: rgba(255,255,255,0.9);
      transform-origin: center center;
      box-shadow: 0 0 6px rgba(255,255,255,0.45);
    }

    .hitmarker::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .hitmarker::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .menu {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      background: radial-gradient(circle at center, #182136 0%, #0b0f18 75%);
    }

    .menu h1 {
      margin: 0 0 8px 0;
      font-size: 40px;
    }

    .menu p {
      margin: 0 0 18px 0;
      opacity: 0.8;
    }

    .menu button {
      width: 220px;
      padding: 14px 18px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
      color: #111827;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="menu" class="menu">
    <h1>3D Zombie FPS</h1>
    <p>单文件完整版基线</p>
    <button id="btnArena">Zombie Arena</button>
    <button id="btnCrossfire">Crossfire</button>
  </div>

  <div id="app"></div>
  <div class="hud" id="hud"></div>
  <div class="hint" id="hint">点击画面锁定鼠标并开始</div>
  <div class="flash" id="flash"></div>
  <div class="crosshair" id="crosshair"></div>
  <div class="hitmarker" id="hitmarker"></div>
  <div id="deathScreen" class="death-screen" style="display:none;">
  <div class="death-card">
    <h1>你死了</h1>
    <p id="deathText">本局得分：0</p>
    <button id="btnRespawn">重新开始</button>
  </div>
</div>
  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js";

    const app = document.getElementById("app");
    const hud = document.getElementById("hud");
    const hint = document.getElementById("hint");
    const flash = document.getElementById("flash");
    const crosshairEl = document.getElementById("crosshair");
    const hitmarkerEl = document.getElementById("hitmarker");
    const menuEl = document.getElementById("menu");
    const btnArena = document.getElementById("btnArena");
    const btnCrossfire = document.getElementById("btnCrossfire");
    const deathScreen = document.getElementById("deathScreen");
    const deathText = document.getElementById("deathText");
    const btnRespawn = document.getElementById("btnRespawn");
    let CURRENT_MAP = "arena";
    let started = false;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d111b);
    scene.fog = new THREE.Fog(0x0d111b, 28, 130);

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.rotation.order = "YXZ";

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0x8ea9ff, 0x2c2c2c, 1.1);
    scene.add(hemi);

    const moon = new THREE.DirectionalLight(0xe8ecff, 1.05);
    moon.position.set(28, 34, 22);
    moon.castShadow = true;
    moon.shadow.mapSize.set(2048, 2048);
    moon.shadow.camera.left = -100;
    moon.shadow.camera.right = 100;
    moon.shadow.camera.top = 100;
    moon.shadow.camera.bottom = -100;
    scene.add(moon);

    const worldSize = 260;

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(worldSize, worldSize, 80, 80),
      new THREE.MeshStandardMaterial({
        color: 0x43454d,
        roughness: 0.96,
        metalness: 0.02
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const ceiling = new THREE.Mesh(
      new THREE.PlaneGeometry(worldSize, worldSize),
      new THREE.MeshStandardMaterial({
        color: 0x171f33,
        roughness: 1,
        side: THREE.DoubleSide
      })
    );
    ceiling.position.y = 4.5;
    ceiling.rotation.x = Math.PI / 2;
    scene.add(ceiling);

    const wallMeshes = [];
    const wallBoxes = [];
    const decalGroup = new THREE.Group();
    const sparkGroup = new THREE.Group();
    const tracerGroup = new THREE.Group();
    const bloodGroup = new THREE.Group();
    scene.add(decalGroup, sparkGroup, tracerGroup, bloodGroup);

    function addWallBox(w, h, d, x, y, z, color = 0x6b7384) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({
          color,
          roughness: 0.88,
          metalness: 0.04
        })
      );
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      wallMeshes.push(mesh);
      wallBoxes.push(new THREE.Box3().setFromObject(mesh));
      return mesh;
    }

    function clearMap() {
      while (wallMeshes.length) {
        const mesh = wallMeshes.pop();
        scene.remove(mesh);
        mesh.geometry.dispose();
        mesh.material.dispose();
      }
      wallBoxes.length = 0;
    }

    function addWindowWallX(centerX, centerZ, totalW, wallH = 4.5, thick = 1.0, windowW = 4, windowBottom = 1.4, windowTop = 3.0) {
      const pillarW = (totalW - windowW) / 2;
      addWallBox(pillarW, wallH, thick, centerX - (windowW / 2 + pillarW / 2), wallH / 2, centerZ);
      addWallBox(pillarW, wallH, thick, centerX + (windowW / 2 + pillarW / 2), wallH / 2, centerZ);

      const lowerH = windowBottom;
      if (lowerH > 0) addWallBox(windowW, lowerH, thick, centerX, lowerH / 2, centerZ);

      const upperH = wallH - windowTop;
      if (upperH > 0) addWallBox(windowW, upperH, thick, centerX, windowTop + upperH / 2, centerZ);
    }

    function addWindowWallZ(centerX, centerZ, totalD, wallH = 4.5, thick = 1.0, windowD = 4, windowBottom = 1.4, windowTop = 3.0) {
      const pillarD = (totalD - windowD) / 2;
      addWallBox(thick, wallH, pillarD, centerX, wallH / 2, centerZ - (windowD / 2 + pillarD / 2));
      addWallBox(thick, wallH, pillarD, centerX, wallH / 2, centerZ + (windowD / 2 + pillarD / 2));

      const lowerH = windowBottom;
      if (lowerH > 0) addWallBox(thick, lowerH, windowD, centerX, lowerH / 2, centerZ);

      const upperH = wallH - windowTop;
      if (upperH > 0) addWallBox(thick, upperH, windowD, centerX, windowTop + upperH / 2, centerZ);
    }

    function buildMapArena() {
      const S = 42;
      const H = 4.5;

      addWallBox(S * 2, H, 1.0, 0, H / 2, -S);
      addWallBox(S * 2, H, 1.0, 0, H / 2,  S);
      addWallBox(1.0, H, S * 2, -S, H / 2, 0);
      addWallBox(1.0, H, S * 2,  S, H / 2, 0);

      addWindowWallX(0, -18, 28, H, 1.0, 6, 1.4, 3.1);
      addWindowWallX(0,  18, 28, H, 1.0, 6, 1.4, 3.1);

      addWindowWallZ(-18, 0, 22, H, 1.0, 5, 1.4, 3.0);
      addWindowWallZ( 18, 0, 22, H, 1.0, 5, 1.4, 3.0);

      addWallBox(10, 2.2, 1.0, -26, 1.1, -8, 0x70798a);
      addWallBox(10, 2.2, 1.0,  26, 1.1,  8, 0x70798a);

      addWallBox(1.0, 2.2, 10, -10, 1.1,  26, 0x70798a);
      addWallBox(1.0, 2.2, 10,  10, 1.1, -26, 0x70798a);

      addWallBox(6, 2.5, 2, -28, 1.25, 20, 0x5e6778);
      addWallBox(6, 2.5, 2,  28, 1.25,-20, 0x5e6778);
      addWallBox(2, 2.5, 6, -20, 1.25,-28, 0x5e6778);
      addWallBox(2, 2.5, 6,  20, 1.25, 28, 0x5e6778);

      addWallBox(8, 3.2, 1.0, -12, 1.6, 0, 0x697183);
      addWallBox(8, 3.2, 1.0,  12, 1.6, 0, 0x697183);
      addWallBox(1.0, 3.2, 8, 0, 1.6, -12, 0x697183);
      addWallBox(1.0, 3.2, 8, 0, 1.6,  12, 0x697183);
    }

    function buildMapCrossfire() {
      const H = 4.5;

      addWallBox(90, H, 1.0, 0, H / 2, -45);
      addWallBox(90, H, 1.0, 0, H / 2,  45);
      addWallBox(1.0, H, 90, -45, H / 2, 0);
      addWallBox(1.0, H, 90,  45, H / 2, 0);

      addWindowWallX(0, 0, 24, H, 1.0, 8, 1.4, 3.1);
      addWindowWallZ(0, 0, 24, H, 1.0, 8, 1.4, 3.1);

      addWallBox(18, 2.4, 1.0, -22, 1.2, -14, 0x70798a);
      addWallBox(18, 2.4, 1.0,  22, 1.2,  14, 0x70798a);

      addWallBox(1.0, 2.4, 18, -14, 1.2, 22, 0x70798a);
      addWallBox(1.0, 2.4, 18,  14, 1.2,-22, 0x70798a);

      addWindowWallX(-28, 28, 14, H, 1.0, 4, 1.2, 3.0);
      addWindowWallX( 28,-28, 14, H, 1.0, 4, 1.2, 3.0);
    }

    const MAP_BUILDERS = {
      arena: buildMapArena,
      crossfire: buildMapCrossfire
    };

    const MAP_SPAWNS = {
      arena: [
        [-22, -22], [22, -22], [-22, 22], [22, 22],
        [0, -30], [0, 30], [-30, 0], [30, 0]
      ],
      crossfire: [
        [-30, -30], [30, 30], [-30, 30], [30, -30],
        [0, -34], [0, 34], [-34, 0], [34, 0]

    };

    const player = {
      position: new THREE.Vector3(-30, 1.65, -30),
      yaw: 0,
      pitch: 0,
      radius: 0.34,
      speed: 6.5,
      health: 100,
      velocityY: 0,
      onGround: true
    };

    const keys = { w:false, a:false, s:false, d:false, space:false, shift:false };
    const state = {

      adsProgress: 0,
      score: 0,

    function weapon() {
      return weapons[state.weaponIndex];
    }

    function updateHud() {
      const w = weapon();
      hud.innerHTML = `
        3D Zombie FPS<br>
        W A S D 移动 | 空格跳跃 | R换弹<br>
        鼠标自由视角 | 右键瞄准 | 1 2 3 切枪<br>
        地图: ${CURRENT_MAP}<br>
        武器: ${w.name}<br>
        弹匣: ${w.ammo} / ${w.magSize}${state.reloading ? "（换弹中）" : ""}<br>
        ❤️ Health: ${Math.max(0, Math.floor(player.health))}<br>
        🎯 Score: ${state.score}
      `;
    }
    updateHud();

    function collidesWithWalls(pos) {
      const sphere = new THREE.Sphere(new THREE.Vector3(pos.x, 1.0, pos.z), player.radius);
      for (const box of wallBoxes) {
        if (box.intersectsSphere(sphere)) return true;
      }
      return false;
    }

    function resolveWallSliding(nextPos) {
      const result = player.position.clone();

      const tryX = result.clone();
      tryX.x = nextPos.x;
      if (!collidesWithWalls(tryX)) result.x = tryX.x;

      const tryZ = result.clone();
      tryZ.z = nextPos.z;
      if (!collidesWithWalls(tryZ)) result.z = tryZ.z;

      return result;
    }

    function makeZombie(x, z, type = "normal") {
      const root = new THREE.Group();
      const torsoRoot = new THREE.Group();
      const leftArmRoot = new THREE.Group();
      const rightArmRoot = new THREE.Group();
      const leftLegRoot = new THREE.Group();
      const rightLegRoot = new THREE.Group();

      let bodyColor = 0x53775a;
      let headColor = 0xa5b89a;
      let shirtColor = 0x708f74;
      let hp = 100;
      let speed = 1.75;
      let attackDamage = 8;
      let attackCooldown = 0.42;
      let ranged = false;
      let rangeDistance = 12;

      if (type === "fast") {
        bodyColor = 0x8a7b22;
        headColor = 0xcab85b;
        shirtColor = 0x9d8c31;
        hp = 70;
        speed = 7.4;
        attackDamage = 9;
        attackCooldown = 0.18;
      } else if (type === "gunner") {
       bodyColor = 0x7a3f3f;
       headColor = 0xbe8d8d;
       shirtColor = 0x8a4b4b;
       hp = 75;
       speed = 1.10;
       attackDamage = 4;
       attackCooldown = 1.35;
       ranged = true;
       rangeDistance = 11;
     } else if (type === "tank") {
        bodyColor = 0x3f5367;
        headColor = 0x7c9ab2;
        shirtColor = 0x4b6276;
        hp = 180;
        speed = 1.05;
        attackDamage = 14;
        attackCooldown = 0.70;
      }

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.76, 0.96, 0.42),
        new THREE.MeshStandardMaterial({ color: bodyColor })
      );
      body.position.y = 1.10;
      torsoRoot.add(body);

      const tornShirt = new THREE.Mesh(
        new THREE.BoxGeometry(0.60, 0.30, 0.10),
        new THREE.MeshStandardMaterial({ color: shirtColor })
      );
      tornShirt.position.set(0, 1.15, 0.23);
      torsoRoot.add(tornShirt);

      const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.50, 0.50, 0.50),
        new THREE.MeshStandardMaterial({ color: headColor })
      );
      head.position.y = 1.82;
      torsoRoot.add(head);

      const hair = new THREE.Mesh(
        new THREE.BoxGeometry(0.52, 0.12, 0.52),
        new THREE.MeshStandardMaterial({ color: 0x25201d })
      );
      hair.position.y = 2.00;
      torsoRoot.add(hair);

      leftArmRoot.position.set(-0.52, 1.52, 0.02);
      rightArmRoot.position.set(0.52, 1.52, 0.02);

      const armL = new THREE.Mesh(
        new THREE.BoxGeometry(0.22, 0.84, 0.22),
        new THREE.MeshStandardMaterial({ color: bodyColor })
      );
      armL.position.set(0, -0.42, 0.16);
      leftArmRoot.add(armL);

      const armR = armL.clone();
      rightArmRoot.add(armR);

      const handL = new THREE.Mesh(
        new THREE.BoxGeometry(0.20, 0.20, 0.20),
        new THREE.MeshStandardMaterial({ color: headColor })
      );
      handL.position.set(0, -0.82, 0.28);
      leftArmRoot.add(handL);

      const handR = handL.clone();
      rightArmRoot.add(handR);

      leftLegRoot.position.set(-0.18, 0.60, 0);
      rightLegRoot.position.set(0.18, 0.60, 0);

      const legL = new THREE.Mesh(
        new THREE.BoxGeometry(0.26, 0.90, 0.26),
        new THREE.MeshStandardMaterial({ color: 0x3f4552 })
      );
      legL.position.set(0, -0.45, 0);
      leftLegRoot.add(legL);

      const legR = legL.clone();
      rightLegRoot.add(legR);

      root.add(torsoRoot, leftArmRoot, rightArmRoot, leftLegRoot, rightLegRoot);
      root.position.set(x, 0, z);

      root.traverse((o) => {
        if (o.isMesh) {
          o.castShadow = true;
          o.receiveShadow = true;
        }
      });

      scene.add(root);

      const hpCanvas = document.createElement("canvas");
      hpCanvas.width = 128;
      hpCanvas.height = 24;
      const hpCtx = hpCanvas.getContext("2d");
      const hpTexture = new THREE.CanvasTexture(hpCanvas);
      const hpSprite = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: hpTexture,
          transparent: true,
          depthTest: false
        })
      );
      hpSprite.scale.set(1.7, 0.32, 1);
      hpSprite.position.set(0, 2.75, 0);
      root.add(hpSprite);
      hpSprite.raycast = () => {};

return {
        type,
        group: root,
        torsoRoot,
        leftArmRoot,
        rightArmRoot,
        leftLegRoot,
        rightLegRoot,
        head,
        body,
        legL,
        legR,
        hpCanvas,
        hpCtx,
        hpTexture,
        hpSprite,
        alive: true,
        hp,
        maxHp: hp,
        attackCooldownTimer: 0,
        attackCooldown,
        attackDamage,
        ranged,
        rangeDistance,
        respawnTimer: 0,
        spawn: new THREE.Vector3(x, 0, z),
        walkTime: Math.random() * 10,
        moving: false,
        attackPhase: 0,
        speed
      };
    }

    function drawEnemyHp(enemy) {
      const ctx = enemy.hpCtx;
      ctx.clearRect(0, 0, 128, 24);
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(4, 8, 120, 8);
      ctx.fillStyle = enemy.type === "tank" ? "#60a5fa" : (enemy.type === "gunner" ? "#f87171" : (enemy.type === "fast" ? "#facc15" : "#22c55e"));
      ctx.fillRect(4, 8, 120 * Math.max(0, enemy.hp) / enemy.maxHp, 8);
      ctx.strokeStyle = "rgba(255,255,255,0.85)";
      ctx.lineWidth = 1;
      ctx.strokeRect(4, 8, 120, 8);
      enemy.hpTexture.needsUpdate = true;
    }

    
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playGunSound(w) {
      if (audioCtx.state === "suspended") audioCtx.resume();

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = "square";
      osc.frequency.setValueAtTime(w.soundBase, now);
      osc.frequency.exponentialRampToValueAtTime(w.soundBase * 0.45, now + 0.08);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(2200, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.10, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.12);
    }

    function createBulletMark(point, normal) {

        old.material.dispose();

        new THREE.MeshBasicMaterial({

          transparent: true,

    const weaponModels = [

    function setWeapon(index) {

      weaponModels.forEach((w, i) => {

    function startReload() {
      const w = weapon();
      if (state.reloading) return;
      if (w.ammo >= w.magSize) return;
      state.reloading = true;
      state.ads = false;
      state.reloadEnd = performance.now() + w.reloadTime;
      updateHud();
    }

    document.addEventListener("keydown", (e) => {
      const k = e.key.toLowerCase();
      if (k === "w") keys.w = true;
      if (k === "a") keys.a = true;
      if (k === "s") keys.s = true;
      if (k === "d") keys.d = true;
      if (k === " ") keys.space = true;
      if (k === "shift") keys.shift = true;
      if (k === "1") setWeapon(0);
      if (k === "2") setWeapon(1);
      if (k === "3") setWeapon(2);
      if (k === "r") startReload();
    });

    document.addEventListener("keyup", (e) => {
      const k = e.key.toLowerCase();
      if (k === "w") keys.w = false;
      if (k === "a") keys.a = false;
      if (k === "s") keys.s = false;
      if (k === "d") keys.d = false;
      if (k === " ") keys.space = false;
      if (k === "shift") keys.shift = false;
    });

    renderer.domElement.addEventListener("mousedown", (e) => {
      if (!state.locked) {
        renderer.domElement.requestPointerLock();
        return;
      }
      if (player.health <= 0) return;
      if (e.button === 0) {
        state.mouseDown = true;
        tryShoot();
      }
    });

    renderer.domElement.addEventListener("contextmenu", (e) => e.preventDefault());

    document.addEventListener("mouseup", (e) => {
      if (e.button === 0) state.mouseDown = false;
    });

    document.addEventListener("mousedown", (e) => {
      if (!state.locked || player.health <= 0) return;
      if (e.button === 2) {
        if (!state.reloading) state.ads = true;
      }
    });

    document.addEventListener("mouseup", (e) => {
      if (e.button === 2) {
        state.ads = false;
      }
    });

    renderer.domElement.addEventListener("click", () => {
      if (!state.locked) renderer.domElement.requestPointerLock();
    });

    document.addEventListener("pointerlockchange", () => {

    });

    document.addEventListener("mousemove", (e) => {
      if (!state.locked || player.health <= 0) return;

      player.yaw -= e.movementX * 0.004;
      player.pitch -= e.movementY * 0.0032;

      const limit = Math.PI / 2 - 0.01;
      player.pitch = Math.max(-limit, Math.min(limit, player.pitch));

    /* ==== PART 2 STARTS HERE ==== */
        function getSpawnPoints() {
      return MAP_SPAWNS[CURRENT_MAP] || MAP_SPAWNS.arena;
    }

    function rebuildMapAndEnemies() {
      clearMap();
      MAP_BUILDERS[CURRENT_MAP]();
      rebuildEnemyRoster();
      if (CURRENT_MAP === "crossfire") {
        player.position.set(0, 1.65, 34);
      } else {
        player.position.set(-30, 1.65, -30);
      }
      player.velocityY = 0;
      player.onGround = true;
      camera.position.copy(player.position);
    }

    function enemyCollidesWall(nextX, nextZ, radius = 0.34) {
      const sphere = new THREE.Sphere(new THREE.Vector3(nextX, 1.0, nextZ), radius);
      for (const box of wallBoxes) {
        if (box.intersectsSphere(sphere)) return true;
      }
      return false;
    }

    function rebuildEnemyRoster() {
      for (const enemy of state.enemies) {
        scene.remove(enemy.group);
      }
      state.enemies.length = 0;

      const spawnPoints = getSpawnPoints();
      for (let i = 0; i < spawnPoints.length; i++) {
        const [x, z] = spawnPoints[i];
        let type = "normal";
        if (i === 1 || i === 5) type = "fast";
        if (i === 2 || i === 6) type = "gunner";
        if (i === 7) type = "tank";
        const zombie = makeZombie(x, z, type);
        drawEnemyHp(zombie);
        state.enemies.push(zombie);
      }
    }

    function getWeaponDirection(totalSpread) {
      const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
      const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
      const up = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);

      dir.add(right.multiplyScalar((Math.random() - 0.5) * totalSpread));
      dir.add(up.multiplyScalar((Math.random() - 0.5) * totalSpread));
      dir.normalize();

      return dir;
    }

    function getBodyZone(enemy, point) {
      const local = enemy.group.worldToLocal(point.clone());
      if (local.y > 1.55) return "head";
      if (local.y < 0.95) return "leg";
      return "body";
    }

    function applyDamage(enemy, zone, w) {
      if (zone === "head") enemy.hp -= w.damageHead;
      else if (zone === "leg") enemy.hp -= w.damageLegs;
      else enemy.hp -= w.damageBody;
      drawEnemyHp(enemy);
    }

    function tryShoot() {
      if (player.health <= 0) return;
      const now = performance.now();
      const w = weapon();
      const shootingAds = (state.ads || keys.shift) && !state.reloading && player.health > 0;

      if (state.reloading) return;
      if (w.ammo <= 0) {
        startReload();
        return;
      }
      if (now - state.lastShot < w.fireDelay) return;

      state.lastShot = now;
      w.ammo -= 1;

      let spreadMultiplier = 1;
      let recoilMultiplier = 1;
         
      if (state.weaponIndex === 0) {
        spreadMultiplier = shootingAds ? 0.52 : 2.10;
        recoilMultiplier = shootingAds ? 0.82 : 1.35;

      } else if (state.weaponIndex === 1) {
        spreadMultiplier = shootingAds ? 0.005 : 2.50;
        recoilMultiplier = shootingAds ? 0.45 : 1.50;

      } else {
        spreadMultiplier = shootingAds ? 0.50 : 1.10;
        recoilMultiplier = shootingAds ? 0.90 : 1.15;
      }
      state.recoil += w.recoil * recoilMultiplier;
      state.spreadBloom = Math.min(
        w.spreadBloomMax,
        state.spreadBloom + w.spreadBloomAdd
      );

      const muzzleStart = new THREE.Vector3();
      weaponModels[state.weaponIndex].userData.gun.getWorldPosition(muzzleStart);

      playGunSound(w);

      for (let i = 0; i < w.pellets; i++) {
        const movingPenalty = (keys.w || keys.a || keys.s || keys.d) ? 1.60 : 1;
        const adsPenalty = shootingAds ? 1 : 2.8;  // 不开镜扩散×2.8
        const totalSpread = (w.spreadBase + state.spreadBloom) * spreadMultiplier * movingPenalty * adsPenalty;
        const dir = getWeaponDirection(totalSpread);
        const ray = new THREE.Raycaster(camera.position, dir, 0, 160);
        ray.camera = camera;

        let bestEnemy = null;
        let bestEnemyHit = null;

        for (const enemy of state.enemies) {
          if (!enemy.alive) continue;
          const hits = ray.intersectObject(enemy.group, true);
          if (hits.length > 0) {
            if (!bestEnemyHit || hits[0].distance < bestEnemyHit.distance) {
              bestEnemy = enemy;
              bestEnemyHit = hits[0];
            }
          }
        }

        const wallHits = ray.intersectObjects(wallMeshes, false);
        const wallHit = wallHits.length > 0 ? wallHits[0] : null;

        let hitEnemyFirst = false;
        if (bestEnemyHit && wallHit) {
          hitEnemyFirst = bestEnemyHit.distance < wallHit.distance;
        } else if (bestEnemyHit) {
          hitEnemyFirst = true;
        }

        if (hitEnemyFirst && bestEnemy && bestEnemyHit) {
          const zone = getBodyZone(bestEnemy, bestEnemyHit.point);
          applyDamage(bestEnemy, zone, w);
          createBlood(bestEnemyHit.point.clone());
          createTracer(muzzleStart, bestEnemyHit.point.clone(), w.color);
          state.hitmarkerTimer = 0.08;
          hitmarkerEl.classList.add("show");

          if (bestEnemy.hp <= 0 && bestEnemy.alive) {
            bestEnemy.alive = false;
            bestEnemy.respawnTimer = 3.0;
            bestEnemy.group.visible = false;
            state.score += 1;
          }
        } else if (wallHit) {
          createTracer(muzzleStart, wallHit.point.clone(), w.color);
          createSparks(wallHit.point.clone(), w.color);
          const normal = wallHit.face.normal.clone().transformDirection(wallHit.object.matrixWorld);
          createBulletMark(wallHit.point.clone(), normal);
        } else {
          createTracer(muzzleStart, muzzleStart.clone().add(dir.multiplyScalar(12)), w.color);
        }
      }

      updateHud();
    }

    function updateWeaponVisuals(dt, isMoving) {
      const t = performance.now() * 0.001;

      const usingAds = (state.ads || keys.shift) && !state.reloading && player.health > 0;
        
      let bobX = 0;
      let bobY = 0;
      let bobRotZ = 0;

      if (isMoving && player.onGround && !usingAds) {
        bobX = Math.sin(t * 5.5) * 0.005;
        bobY = Math.abs(Math.cos(t * 11)) * 0.007;
        bobRotZ = Math.sin(t * 5.5) * 0.008;
      }

      let reloadX = 0;
      let reloadY = 0;
      let reloadRotZ = 0;
      let reloadRotY = 0;

      if (state.reloading) {
        const total = weapon().reloadTime;
        const remaining = state.reloadEnd - performance.now();
        const progress = THREE.MathUtils.clamp(1 - remaining / total, 0, 1);

        if (progress < 0.25) {
          const p = progress / 0.25;
          reloadRotZ = -1.0 * p;
          reloadRotY = -0.35 * p;
          reloadY = 0.08 * p;
        } else if (progress < 0.8) {
          const p = (progress - 0.25) / 0.55;
          reloadRotZ = -1.0;
          reloadRotY = -0.35;
          reloadY = 0.08 + Math.sin(p * Math.PI * 3) * 0.05;
          reloadX = -0.03;
        } else {
          const p = (progress - 0.8) / 0.2;
          reloadRotZ = -1.0 * (1 - p);
          reloadRotY = -0.35 * (1 - p);
          reloadY = 0.08 * (1 - p);
        }
      }

      const activeWeapon = weaponModels[state.weaponIndex];
      const gun = activeWeapon.userData.gun;
      const basePos = activeWeapon.userData.basePos;
      const adsOffset = activeWeapon.userData.adsOffset;

      const targetAds = usingAds ? 1 : 0;
      const adsSpeed = weapon().adsSpeed ?? 8;

      state.adsProgress += (targetAds - state.adsProgress) * Math.min(1, dt * adsSpeed);

      const adsBlend = state.adsProgress;

      const targetScale = (usingAds && state.weaponIndex === 1) ? 1.18 : 1.0;
      const scaleVec = new THREE.Vector3(targetScale, targetScale, targetScale);
      activeWeapon.scale.lerp(scaleVec, Math.min(1, dt * 12));
      const targetX = basePos.x + adsOffset.x * adsBlend;
      const targetY = basePos.y + adsOffset.y * adsBlend;
      const targetZ = basePos.z + adsOffset.z * adsBlend;

      gun.position.x += (targetX - gun.position.x) * Math.min(1, dt * 16);
      gun.position.y += (targetY - gun.position.y) * Math.min(1, dt * 16);
      gun.position.z += (targetZ - gun.position.z) * Math.min(1, dt * 16);
         
      const hideCrosshair = usingAds && state.weaponIndex !== 1;
      crosshairEl.classList.toggle("hidden", hideCrosshair);

      weaponRoot.position.set(bobX + reloadX, -state.recoil - bobY + reloadY, 0);
      weaponRoot.rotation.set(
        state.recoil * (usingAds ? 0.7 : 1.0),
        reloadRotY,
        bobRotZ + reloadRotZ
      );

      const targetFov = usingAds ? 38 : 75;
      if (camera.fov !== targetFov) {
        camera.fov += (targetFov - camera.fov) * Math.min(1, dt * 10);
        camera.updateProjectionMatrix();
      }
    }

    function updateWeapon(dt) {
      const w = weapon();

      if (state.reloading && performance.now() >= state.reloadEnd) {
        state.reloading = false;
        w.ammo = w.magSize;
        updateHud();
      }

      state.spreadBloom = Math.max(0, state.spreadBloom - w.recover * dt);
      state.recoil *= Math.pow(0.13, dt);
      if (state.recoil < 0.0002) state.recoil = 0;

      const movingNow = keys.w || keys.a || keys.s || keys.d;
      updateWeaponVisuals(dt, movingNow);
    }

    function updatePlayer(dt) {
      if (player.health <= 0) {
        camera.position.copy(player.position);
        camera.rotation.y = player.yaw;
        camera.rotation.x = player.pitch;
        return;
      }
      
      const forward = new THREE.Vector3(0, 0, -1)
        .applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);
      const right = new THREE.Vector3(1, 0, 0)
        .applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);

      const move = new THREE.Vector3();
      if (keys.w) move.add(forward);
      if (keys.s) move.sub(forward);
      if (keys.d) move.add(right);
      if (keys.a) move.sub(right);

      if (move.lengthSq() > 0) {
        move.normalize().multiplyScalar(player.speed * dt);
        const next = player.position.clone().add(new THREE.Vector3(move.x, 0, move.z));
        const resolved = resolveWallSliding(next);
        player.position.x = resolved.x;
        player.position.z = resolved.z;  
      }

      if (keys.space && player.onGround) {
        player.velocityY = 5.8;
        player.onGround = false;
      }

      player.velocityY -= 14 * dt;
      player.position.y += player.velocityY * dt;

      if (player.position.y <= 1.65) {
        player.position.y = 1.65;
        player.velocityY = 0;
        player.onGround = true;
      }

      const movingNow = keys.w || keys.a || keys.s || keys.d;
      const headBob = (movingNow && player.onGround)
        ? Math.abs(Math.sin(performance.now() * 0.012)) * 0.02
        : 0;

      camera.position.copy(player.position);
      camera.position.y += headBob;
      camera.rotation.y = player.yaw;
      camera.rotation.x = player.pitch;
    }
    function showDeathScreen() {
      deathText.textContent = `本局得分：${state.score}`;
      deathScreen.style.display = "flex";
      crosshairEl.classList.add("hidden");
      state.mouseDown = false;
      state.ads = false;
          
      if (document.pointerLockElement) {
        document.exitPointerLock();
      }
    }

    function hideDeathScreen() {
      deathScreen.style.display = "none";
    }
    function damagePlayer(amount) {
      if (player.health <= 0) return;
             
      player.health = Math.max(0, player.health - amount);
      state.flashTimer = 0.14;
      updateHud();
           
      if (player.health <= 0) {
        showDeathScreen();
      }
    }

    function updateEnemies(dt) {
      for (const enemy of state.enemies) {
        if (!enemy.alive) {
          enemy.respawnTimer -= dt;
          if (enemy.respawnTimer <= 0) {
            enemy.alive = true;
            enemy.hp = enemy.maxHp;
            enemy.group.visible = true;
            enemy.group.position.copy(enemy.spawn);
            drawEnemyHp(enemy);
          }
          continue;
        }

        const dx = player.position.x - enemy.group.position.x;
        const dz = player.position.z - enemy.group.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        enemy.group.rotation.y = Math.atan2(dx, dz);
        enemy.attackCooldownTimer -= dt;

        const shouldStopForRanged = enemy.ranged && dist < enemy.rangeDistance && dist > 4.8;

        if (!shouldStopForRanged && dist > 1.8) {
          const stepX = (dx / dist) * enemy.speed * dt;
          const stepZ = (dz / dist) * enemy.speed * dt;

          const nx = enemy.group.position.x + stepX;
          const nz = enemy.group.position.z + stepZ;

          if (!enemyCollidesWall(nx, enemy.group.position.z)) {
            enemy.group.position.x = nx;
          }
          if (!enemyCollidesWall(enemy.group.position.x, nz)) {
            enemy.group.position.z = nz;
          }

          enemy.walkTime += dt * (enemy.type === "fast" ? 12 : 8);
          enemy.moving = true;
        } else {
          enemy.moving = false;
        }

        const walk = Math.sin(enemy.walkTime) * 0.55;
        const bob = Math.abs(Math.sin(enemy.walkTime * 2)) * 0.05;

        if (dist < 2.2 && !enemy.ranged) {
          enemy.attackPhase += dt * 10;
        } else if (enemy.ranged && dist < enemy.rangeDistance) {
          enemy.attackPhase += dt * 6;
        } else {
          enemy.attackPhase = 0;
        }

        const attackSwing = enemy.attackPhase > 0 ? Math.max(0, Math.sin(enemy.attackPhase)) * 0.6 : 0;

        enemy.leftArmRoot.rotation.x = -1.0 + attackSwing + walk * 0.15;
        enemy.rightArmRoot.rotation.x = -1.0 + attackSwing - walk * 0.15;
        enemy.leftLegRoot.rotation.x = enemy.moving ? -walk : 0;
        enemy.rightLegRoot.rotation.x = enemy.moving ? walk : 0;
        enemy.torsoRoot.position.y = bob;

        if (!enemy.ranged) {
          if (dist < 2.05 && enemy.attackCooldownTimer <= 0) {
            enemy.attackCooldownTimer = enemy.attackCooldown;
            damagePlayer(enemy.attackDamage);
          }
        } else {
          if (dist < enemy.rangeDistance && enemy.attackCooldownTimer <= 0) {
            const start = enemy.group.position.clone().add(new THREE.Vector3(0, 1.6, 0));
            const end = player.position.clone().add(new THREE.Vector3(0, 1.3, 0));
            const shotDir = end.clone().sub(start).normalize();
            const ray = new THREE.Raycaster(start, shotDir, 0, start.distanceTo(end));
            const wallHits = ray.intersectObjects(wallMeshes, false);

          if (wallHits.length === 0) {
            enemy.attackCooldownTimer = enemy.attackCooldown;
            damagePlayer(enemy.attackDamage);
            createTracer(start, end, 0xff6666);
         }
        }
       }
     } 
   }

    function updateTracers(dt) {
      for (let i = state.tracers.length - 1; i >= 0; i--) {
        const t = state.tracers[i];
        t.life -= dt;
        t.material.opacity = Math.max(0, t.life / t.maxLife);
        if (t.life <= 0) {
          tracerGroup.remove(t.line);
          t.line.geometry.dispose();
          t.material.dispose();
          state.tracers.splice(i, 1);
        }
      }
    }

    function updateEffects(dt) {
      updateBlood(dt);
      updateSparks(dt);
      updateTracers(dt);

      if (state.flashTimer > 0) {
        state.flashTimer -= dt;
        flash.style.background = "rgba(255,0,0,0.20)";
      } else {
        flash.style.background = "rgba(255,0,0,0)";
      }

      if (state.hitmarkerTimer > 0) {
        state.hitmarkerTimer -= dt;
      } else {
        hitmarkerEl.classList.remove("show");
      }
    }

    function animate() {
      const dt = Math.min(clock.getDelta(), 0.033);

      updatePlayer(dt);
      updateWeapon(dt);
      updateEnemies(dt);
      updateEffects(dt);
      updateHud();

      if (player.health > 0 && state.mouseDown && weapon().auto) {
        tryShoot();
      }

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    const clock = new THREE.Clock();

    function startGame(mapName) {
      hideDeathScreen();
      CURRENT_MAP = mapName;
      menuEl.style.display = "none";
      rebuildMapAndEnemies();
      state.score = 0;
      player.health = 100;
      state.ads = false;
      state.adsProgress = 0;
      state.mouseDown = false;
      state.reloading = false;
      state.recoil = 0;
      state.spreadBloom = 0;

      for (const w of weapons) {
        w.ammo = w.magSize;
      }

      setWeapon(1);
      updateHud();

      if (!started) {
        started = true;
        animate();
      }
    }

    btnArena.addEventListener("click", () => startGame("arena"));
    btnCrossfire.addEventListener("click", () => startGame("crossfire"));
    btnRespawn.addEventListener("click", () => {
      hideDeathScreen();
      startGame(CURRENT_MAP);
    });
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
