<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FPS Game</title>
<style>
body { margin:0; overflow:hidden; background:#000; }

#menu{
 position:absolute;
 width:100%; height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 background:#000c;
 color:white;
}

button{
 margin:10px;
 padding:15px 30px;
 font-size:18px;
 cursor:pointer;
}

.crosshair{
 position:absolute;
 left:50%; top:50%;
 transform:translate(-50%,-50%);
 width:20px;height:20px;
}

.crosshair::before,
.crosshair::after{
 content:"";
 position:absolute;
 background:white;
}

.crosshair::before{ width:2px;height:20px;left:9px;}
.crosshair::after{ width:20px;height:2px;top:9px;}

</style>
</head>

<body>

<div id="menu">
<h1>FPS Game</h1>
<button onclick="startGame('zombie')">Zombie Mode</button>
<button onclick="startGame('duel')">1v1</button>
<button onclick="startGame('custom')">Custom</button>
</div>

<div class="crosshair"></div>

<script type="module" src="./main.js"></script>

</body>
</html>
