<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2048</title>
<style>
body {
  background: #faf8ef;
  font-family: Arial;
  text-align: center;
}
h1 { font-size: 50px; }
.grid {
  display: grid;
  grid-template-columns: repeat(4, 100px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}
.cell {
  width: 100px;
  height: 100px;
  background: #cdc1b4;
  font-size: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

<body>

<h1>2048</h1>
<p>Use arrow keys</p>

<div class="grid" id="grid"></div>

<script>
let grid = document.getElementById("grid");
let cells = [];
let board = [];

function init() {
  grid.innerHTML = "";
  board = [];
  cells = [];
  for (let i = 0; i < 16; i++) {
    let cell = document.createElement("div");
    cell.className = "cell";
    grid.appendChild(cell);
    cells.push(cell);
    board.push(0);
  }
  add();
  add();
  draw();
}

function add() {
  let empty = board.map((v,i)=>v===0?i:null).filter(v=>v!==null);
  if (empty.length === 0) return;
  let i = empty[Math.floor(Math.random()*empty.length)];
  board[i] = Math.random()<0.9 ? 2 : 4;
}

function draw() {
  cells.forEach((c,i)=>{
    c.textContent = board[i]===0 ? "" : board[i];
  });
}

function move(dir) {
  let old = [...board];

  for (let i=0;i<4;i++) {
    let row = [];
    for (let j=0;j<4;j++) {
      let idx = dir==='left'||dir==='right'? i*4+j : j*4+i;
      row.push(board[idx]);
    }

    if (dir==='right'||dir==='down') row.reverse();

    row = row.filter(x=>x);
    for (let k=0;k<row.length-1;k++) {
      if (row[k]===row[k+1]) {
        row[k]*=2;
        row[k+1]=0;
      }
    }
    row = row.filter(x=>x);

    while(row.length<4) row.push(0);

    if (dir==='right'||dir==='down') row.reverse();

    for (let j=0;j<4;j++) {
      let idx = dir==='left'||dir==='right'? i*4+j : j*4+i;
      board[idx]=row[j];
    }
  }

  if (board.toString() !== old.toString()) {
    add();
    draw();
  }
}

document.addEventListener("keydown", e=>{
  if (e.key==="ArrowLeft") move("left");
  if (e.key==="ArrowRight") move("right");
  if (e.key==="ArrowUp") move("up");
  if (e.key==="ArrowDown") move("down");
});

init();
</script>

</body>
</html>
